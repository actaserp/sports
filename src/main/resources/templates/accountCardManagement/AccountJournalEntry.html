<th:block layout:fragment="scripts">
  <th:block th:replace="common/popup_account :: popup_account" />
  <th:block th:replace="common/popup_company_employee_bank_card.html :: popup_company"></th:block>
  <script th:src="@{/js/cycle/AccountInputHandler.js}"></script>
  <script type="text/javascript">
   class BankHistoryPage {
    constructor() {
     this.url = '/api/account_management/bank_assignment';
     this.grid = null;
     this.viewData = new wijmo.collections.CollectionView();
     this.init();
    }
    init() {
     let _this = this;

     // 재원
     this.mssecOptions = AjaxUtil.getSelectDataWithNull('mssec', 'choose');

     let dicMssec = {};
     $.each(this.mssecOptions, function (idx, item) {
      dicMssec[item.value] = item.text;
     });

     // DataMap 생성
     let mssecMap = new wijmo.grid.DataMap(this.mssecOptions, 'value', 'text');

     _this.grid = new wijmo.grid.FlexGrid('#theGrid_BankHistory', {
      headersVisibility: wijmo.grid.HeadersVisibility.Column,
      autoGenerateColumns: false,
      showMarquee: true,
      allowSorting: 'MultiColumn',
      selectionMode: wijmo.grid.SelectionMode.Cell,
      isReadOnly: false,
      imeEnabled: true,
      frozenColumns: 2,
      formatItem: (s, e) => {

       if (e.panel.cellType === wijmo.grid.CellType.Cell) {
        const row = s.rows[e.row];
        if (row instanceof wijmo.grid.GroupRow) {
         e.cell.style.overflow = 'visible';
         e.cell.style.whiteSpace = 'nowrap';
         e.cell.style.textOverflow = 'clip';
        }
       }

       if (e.panel.cellType === wijmo.grid.CellType.ColumnHeader) {
        const binding = s.columns[e.col].binding;

        // 기본값 먼저 초기화
        e.cell.style.textAlign = 'center';
        e.cell.style.color = '';
        e.cell.style.fontWeight = '';

        // 강조할 헤더만 다시 적용
        if (
         binding === 'busim' ||
         binding === 'accnm' ||
         binding === 'accnm2' ||
         binding === 'it1nm' ||
         binding === 'it2nm' ||
         binding === 'mssecnm' ||
         binding === 'mssec' ||
         binding === 'summy'  ||
         binding === 'subject'
        ) {
         e.cell.style.color = '#5567ff';
         e.cell.style.fontWeight = 'bold';
        }
       }
      },
      columns: [
       {
        binding: 'selected',
        header: '선택',
        width: 70,
        align: 'center',
        dataType: wijmo.DataType.Boolean,
        isReadOnly: false
       },
       {
        binding: 'slip_cancel_yn',
        header: '전표취소',
        width: 90,
        align: 'center',
        dataType: wijmo.DataType.Boolean,
        isReadOnly: false
       },
       { binding: 'custcd', header: 'custcd', visible: false },
       { binding: 'spjangcd', header: 'spjangcd', visible: false },
       { binding: 'bnkcode', header: 'bnkcode', visible: false },
       { binding: 'fintech_use_num', header: 'fintech_use_num', visible: false },
       { binding: 'bank_tran_id', header: 'bank_tran_id', visible: false },
       {binding: 'tran_date', header: '일자', width: 100, align: 'center', isReadOnly: true},
       {binding: 'inout_type', header: '입출구분', width: 120, align: 'center', isReadOnly: true},
       {binding: 'tran_amt', header: '입금액', width: 100, align: 'right', isReadOnly: true},
       {binding: 'wdr_amt', header: '출금액', width: 100, align: 'right', isReadOnly: true},
       {binding: 'cltcd', header: '거래처',  visible: false},
       {binding: 'subject', header: '적요', width: 230, align: 'left', isReadOnly: false},

       {binding: 'bsdate', header: '사업코드1', visible: false},
       {binding: 'bseccd', header: '사업코드2', visible: false},
       {binding: 'buiscd', header: '사업코드', visible: false},
       {binding: 'busim', header: '사업명', width: 300, align: 'left', isReadOnly: false},
       {binding: 'acccd', header: '관코드', visible: false},
       {binding: 'accnm', header: '관명', width: 150, align: 'left', isReadOnly: false},
       {binding: 'acccd2', header: '상대계정코드', visible: false },
       {binding: 'accnm2', header: '상대계정명', width: 150, align: 'left', isReadOnly: false },
       {binding: 'it1cd', header: '항코드',visible: false },
       {binding: 'it1nm', header: '항', width: 150, align: 'left', isReadOnly: false},
       {binding: 'it2cd', header: '목코드', visible: false},
       {binding: 'it2nm', header: '목', width: 150, align: 'left', isReadOnly: false},
       {binding: 'mssec', header: '재원코드', width: 100, visible: false},
       {binding: 'mssecnm', header: '재원', width: 100, align: 'left', isReadOnly: false},
       {binding: 'summy', header: '산출내역', width: 140, align: 'left', isReadOnly: false},

       {binding: '', header: '제목', width: 250, align: 'left', isReadOnly: true, visible: false},
       {binding: 'acc_spdate', header: '전표일자', visible: false},
       {binding: 'acc_spnum', header: '전표번호', visible: false},
       {binding: 'acc_spdate_num', header: '전표일자/번호', width: 160, align: 'left', isReadOnly: true},

      ],
      itemsSource: this.viewData,
     });

     _this.grid.keyActionEnter = wijmo.grid.KeyAction.None;

     // 재원 수정 완료 시 자동 체크 갱신
     _this.grid.cellEditEnded.addHandler((s, e) => {
      const item = s.rows[e.row]?.dataItem;
      const col = s.columns[e.col];

      if (!item || !col) return;

      if (col.binding === 'mssec' || col.binding === 'mssecnm') {
       _this.updateRowSelected(item);
       s.collectionView.refresh();
      }
     });

     new FlexGridContextMenu(this.grid);
     _this.grid.downloadFileName = '전표분개 내역';

     // footer 합계행 추가
     _this.grid.columnFooters.rows.push(new wijmo.grid.GroupRow());

// '일자' 컬럼 위치에 합계 표시 (기존 apv_dt → tran_date로 수정)
     const tranDateColIndex = _this.grid.columns.findIndex(c => c.binding === 'tran_date');
     if (tranDateColIndex > -1) {
      _this.grid.columnFooters.setCellData(0, tranDateColIndex, '합계');
     }

// 금액 컬럼 aggregate 지정 (기존 apv_tm → tran_amt, wdr_amt로 수정)
     const tranAmtCol = _this.grid.columns.getColumn('tran_amt');
     if (tranAmtCol) {
      tranAmtCol.aggregate = wijmo.Aggregate.Sum;
     }

     const wdrAmtCol = _this.grid.columns.getColumn('wdr_amt');
     if (wdrAmtCol) {
      wdrAmtCol.aggregate = wijmo.Aggregate.Sum;
     }

     // 데이터 로드 후 초기 선택 해제
     _this.grid.loadedRows.addHandler(() => {
      setTimeout(() => {
       _this.grid.select(-1, -1);
      }, 0);
     });

     _this.grid.hostElement.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') {
       return;
      }

      const g = _this.grid;
      const sel = g.selection;

      if (!sel || sel.row < 0 || sel.col < 0) {
       return;
      }

      const col = g.columns[sel.col];
      if (!col) {
       return;
      }

      e.preventDefault();

      let item = g.rows[sel.row].dataItem;

      let inputValue = '';
      if (g.activeEditor) {
       inputValue = g.activeEditor.value ? g.activeEditor.value.trim() : '';
      } else {
       inputValue = g.getCellData(sel.row, sel.col, true);
       inputValue = inputValue ? inputValue.toString().trim() : '';
      }

      g.finishEditing();

      // 적요에서 엔터 -> 같은 행의 사업명으로 이동
      if (col.binding === 'subject') {
       item[col.binding] = inputValue;
       _this.moveToCellAndEdit(sel.row, 'busim');
       return;
      }

      // 사업명에서 엔터 -> 사업 조회 팝업
      if (col.binding === 'busim') {
       item[col.binding] = inputValue;
       _this.searchBusim(item, sel.row);
       return;
      }

      // 관명에서 엔터 -> 관 조회 팝업
      if (col.binding === 'accnm') {
       item[col.binding] = inputValue;
       _this.searchAccnm(item, sel.row);
       return;
      }

      // 상대계정명에서 엔터 -> 상대계정 조회 팝업
      if (col.binding === 'accnm2') {
       item[col.binding] = inputValue;
       _this.searchAccnm2(item, sel.row);
       return;
      }

      // 항에서 엔터 -> 항 조회 팝업
      if (col.binding === 'it1nm') {
       item[col.binding] = inputValue;
       _this.searchIt1nm(item, sel.row);
       return;
      }

      // 목에서 엔터 -> 목 조회 팝업
      if (col.binding === 'it2nm') {
       item[col.binding] = inputValue;
       _this.searchIt2nm(item, sel.row);
       return;
      }

      // 재원
      if (col.binding === 'mssecnm') {
       _this.searchMssec(item, sel.row);
       return;
      }
      if (col.binding === 'mssec') {
       _this.moveToCellAndEdit(sel.row, 'summy');
       return;
      }

      // 산출내역에서 엔터 -> 다음 행의 적요로 이동
      if (col.binding === 'summy') {
       item[col.binding] = inputValue;
       const nextRow = sel.row + 1;
       if (nextRow < g.rows.length) {
        _this.moveToCellAndEdit(nextRow, 'subject');
       }
       return;
      }

      // 그 외 일반 이동
      const nextPos = _this.findNextEditableCell(sel.row, sel.col);
      if (!nextPos) return;

      g.select(nextPos.row, nextPos.col);
      g.scrollIntoView(nextPos.row, nextPos.col, true);
      g.startEditing(true);
     });

     // 사업명 셀 진입 시 remark1 히스토리 자동 적용
     _this.grid.beginningEdit.addHandler((s, e) => {
      const col = s.columns[e.col];
      const item = s.rows[e.row]?.dataItem;

      if (!item || !col) return;

      // 사업명 칸 진입 & 관/항/목이 아직 비어있을 때만
      if (col.binding === 'busim' && !item.acccd && !item.it1cd && !item.it2cd) {

       if (_this._applyingHistory) return; // 재진입 방지

       const hist = _this.remarkHistory?.[item.remark1];
       if (hist) {
        e.cancel = true;
        _this._applyingHistory = true;
        _this.applyRemarkHistoryToRow(item, hist, e.row);
        setTimeout(() => {
         _this._applyingHistory = false;
        }, 200);
       }
      }
     });

    }//init

    // 사업명 조회
    searchBusim(item, rowIndex) {
     let _this = this;
     let url = '/api/account_management/card_history/findBusim';
     let data = {
      busim: item.busim
     };

     let fnsuccess = function (res) {
      let list = res.data || [];

      if (!list || list.length === 0) {
       Alert.alert('', '사업 조회 결과가 없습니다.');
       return;
      }

      _this.showBusimPopup(list, rowIndex);
     };

     AjaxUtil.getAsyncData(url, data, fnsuccess);
    }

    showBusimPopup(dataList, rowIndex) {
     let _this = this;

     _this.selectedRowIndexForPopup = rowIndex;

     // 기존 팝업이 있으면 제거
     if (_this.busimPopup) {
      _this.busimPopup.close();
      _this.busimPopup = null;
     }

     // 템플릿 HTML 가져오기
     let content = tmpl('businmTemplate', {});

     // 팝업 열기
     _this.busimPopup = new PopupDraggable('사업 조회');

    //다음칸 이동 공통함수
    moveToCellAndEdit(rowIndex, binding) {
     let g = this.grid;
     const nextCol = g.columns.getColumn(binding);

     if (!nextCol) return;

     setTimeout(() => {
      g.select(rowIndex, nextCol.index);
      g.scrollIntoView(rowIndex, nextCol.index, true);
      g.focus(); // 또는 g.hostElement.focus();
      g.startEditing(true);
     }, 50);
    }
    moveToMssecAndOpen(rowIndex) {
     let g = this.grid;
     const col = g.columns.getColumn('mssec');

     if (!col) return;

     setTimeout(() => {
      g.select(rowIndex, col.index);
      g.scrollIntoView(rowIndex, col.index, true);
      g.focus();
      g.startEditing(true);

      setTimeout(() => {
       const editor = g.activeEditor;
       if (editor) {
        editor.focus();
        editor.dispatchEvent(new Event('click')); // 클릭 이벤트 발생
        editor.dispatchEvent(new KeyboardEvent('keydown', {
         key: 'ArrowDown',
         code: 'ArrowDown',
         keyCode: 40,
         which: 40,
         bubbles: true
        })); // 아래 화살표 키 이벤트 발생
       }
      }, 30);
     }, 50);
    }
    //일반이동
    findNextEditableCell(row, col) {
     const g = this.grid;
     const rowCount = g.rows.length;
     const colCount = g.columns.length;

     for (let r = row; r < rowCount; r++) {
      let startCol = (r === row) ? col + 1 : 0;

      for (let c = startCol; c < colCount; c++) {
       if (this.isEditableCell(r, c)) {
        return {row: r, col: c};
       }
      }
     }

     return null;
    }

    isEditableCell(row, col) {
     const g = this.grid;
     const column = g.columns[col];
     const gridRow = g.rows[row];

     if (!column || !gridRow) {
      return false;
     }

     if (column.isReadOnly) {
      return false;
     }

     if (!(gridRow instanceof wijmo.grid.Row)) {
      return false;
     }

     if (!column.visible) {
      return false;
     }

     return true;
    }

    buildRemarkHistory(dataList) {
     this.remarkHistory = {};
     if (!dataList) return;

     dataList.forEach(item => {
      const key = item.remark1;
      if (!key) return;

      if (item.acccd && item.it1cd && item.it2cd) {
       this.remarkHistory[key] = {
        acccd:  item.acccd,
        accnm:  item.accnm,
        it1cd:  item.it1cd,
        it1nm:  item.it1nm,
        it2cd:  item.it2cd,
        it2nm:  item.it2nm,
        acccd2: item.acccd2,
        accnm2: item.accnm2,
       };
      }
     });
    }
    applyRemarkHistoryToRow(rowItem, hist, rowIndex) {
     rowItem.acccd  = hist.acccd  || '';
     rowItem.accnm  = hist.accnm  || '';
     rowItem.it1cd  = hist.it1cd  || '';
     rowItem.it1nm  = hist.it1nm  || '';
     rowItem.it2cd  = hist.it2cd  || '';
     rowItem.it2nm  = hist.it2nm  || '';
     rowItem.acccd2 = hist.acccd2 || '';
     rowItem.accnm2 = hist.accnm2 || '';

     this.grid.collectionView.refresh();

     // 적용 후 사업명으로 커서 이동
     this.moveToCellAndEdit(rowIndex, 'busim');
    }

    //검색/조회
    searchMainData() {
     let _this = this;
     let url = this.url + '/read';

     let start = $('#searchfrdate').val();
     let end = $('#searchtodate').val();

     let data = {
      'start': start,
      'end': end,
      cboCompanyHidden: $('#cboCompanyHidden').val(),
      cltflag: $('#cltflag').val(),
      accountNameHidden: $('#accountNameHidden').val(),
      accountName: $('#accountName').val(),
      accflag: $('#accflag').val(),
     };

     let fnsuccess = function (result) {
      if (result != null) {

       _this.viewData = new wijmo.collections.CollectionView(result.data);

       // ✅ acc_spdate/acc_spnum 있는 데이터가 하나라도 있을 때만 그룹핑
       let hasGroupData = result.data.some(item => item.acc_spdate && item.acc_spnum);

       if (hasGroupData) {
        let gd = new wijmo.collections.PropertyGroupDescription(
         null,
         function (item) {
          let date = item.acc_spdate || '';
          let num  = item.acc_spnum  || '';

          if (!date.trim() && !num.trim()) return '미발행';

          return '생성된 전표 ' + date + '/' + num;
         }
        );
        _this.viewData.groupDescriptions.push(gd);
       }

       _this.grid.itemsSource = _this.viewData;

       _this.buildRemarkHistory(result.data);

       AjaxUtil.getAsyncData(_this.url + '/bankAccHistory', {}, function(res) {
        if (res.data) {
         res.data.forEach(item => {
          if (!_this.remarkHistory[item.remark1]) {
           _this.remarkHistory[item.remark1] = {
            acccd:  item.acccd,
            accnm:  item.accnm,
            it1cd:  item.it1cd,
            it1nm:  item.it1nm,
            it2cd:  item.it2cd,
            it2nm:  item.it2nm,
            acccd2: item.acccd2,
            accnm2: item.accnm2,
           };
          }
         });
        }
       });
      }
     };
     AjaxUtil.getAsyncData(url, data, fnsuccess);
    }

    //전표생성
    newAccountSave() {
     let _this = this;

     let items = _this.viewData ? _this.viewData.items : [];
     let selectedItems = items.filter(item => item.selected === true);

     if (!selectedItems || selectedItems.length === 0) {
      Alert.alert('', '선택된 데이터가 없습니다.');
      return;
     }

     // 필수값 체크: 관명, 항, 목, 산출내역
     let invalidRows = selectedItems.filter(item =>
      !item.acccd || !item.it1cd || !item.it2cd || !item.summy
     );

     if (invalidRows.length > 0) {
      Alert.alert('', '선택된 행 중 필수값(관명, 항, 목, 산출내역)이 없는 데이터가 있습니다.');
      return;
     }

     // 이미 전표가 생성된 항목 체크
     let alreadyCreated = selectedItems.filter(item =>
      item.acc_spdate && item.acc_spdate.trim() !== ''
     );

     if (alreadyCreated.length > 0) {
      Alert.alert('', '이미 전표가 생성된 항목이 포함되어 있습니다.');
      return;
     }

     Alert.confirm('', '선택한 항목의 전표를 생성하시겠습니까?', function(){

      // console.log('selectedItems 개수:', selectedItems.length);
      // console.log('selectedItems:', JSON.stringify(selectedItems));

      let data = {
       items: JSON.stringify(selectedItems.map(item => ({
        custcd: item.custcd,
        spjangcd: item.spjangcd,
        bnkcode: item.bnkcode,
        fintech_use_num: item.fintech_use_num,
        bank_tran_id: item.bank_tran_id,
        tran_date: item.tran_date,
        inout_type: item.inout_type,
        tran_amt: item.tran_amt,
        wdr_amt: item.wdr_amt,
        subject: item.subject,
        acccd: item.acccd,
        accnm: item.accnm,
        acccd2: item.acccd2,
        accnm2 : item.accnm2 ,
        it1cd: item.it1cd,
        it1nm: item.it1nm,
        it2cd: item.it2cd,
        it2nm: item.it2nm,
        summy: item.summy,
        bsdate: item.bsdate ,
        bseccd: item.bseccd ,
        buiscd: item.buiscd ,
        busim: item.busim,
        cltcd : item.cltcd
       }))),
       slipType :$('#slipType').val()
      };

      let fnsuccess = function (res) {
       if (res.success) {
        Notify.success('전표가 생성되었습니다.');
        _this.searchMainData();
       } else {
        Alert.alert('', res.message || '전표 생성 중 오류가 발생했습니다.');
       }
      };

      AjaxUtil.postAsyncData(_this.url + '/createSlip', data, fnsuccess);
     });
    }

    //전표 생성 취소
    newSlipCancel(){
     let _this = this;

     let items = _this.viewData ? _this.viewData.items : [];
     let selectedItems = items.filter(item => item.slip_cancel_yn === true);

     if (!selectedItems || selectedItems.length === 0) {
      Alert.alert('', '취소할 전표를 선택해주세요.');
      return;
     }

     // 전표가 생성되지 않은 항목 체크
     let noSlipItems = selectedItems.filter(item =>
      !item.acc_spdate || item.acc_spdate.trim() === ''
     );

     if (noSlipItems.length > 0) {
      Alert.alert('', '전표가 생성되지 않은 항목이 포함되어 있습니다.');
      return;
     }

     Alert.confirm('', '선택한 전표를 취소하시겠습니까?', function(){
      console.log('cancelData selectedItems:', JSON.stringify(selectedItems));
      let cancelData = {
       items: JSON.stringify(selectedItems.map(item => ({
        custcd: item.custcd,
        spjangcd: item.spjangcd,
        bnkcode: item.bnkcode,
        fintech_use_num: item.fintech_use_num,
        bank_tran_id: item.bank_tran_id,
        tran_date: item.tran_date,
        acc_spdate: item.acc_spdate,
        acc_spnum:item.acc_spnum,

       })))
      };

       } else {

       }
      };

      AjaxUtil.postAsyncData(_this.url + '/cancelSlip', cancelData, fnsuccess);
     });

    // 은행 입출금 내역 저장
    BankSave() {
     let _this = this;

     let rows = this.viewData.items.filter(item => item.selected === true);

     if (rows.length === 0) {
      Alert.alert('', '선택된 행이 없습니다.');
      return;
     }

     // 필수값 체크
     // 상대코드까지 필수라면 !item.acccd2 도 추가
     let invalid = rows.filter(item =>
      !item.acccd ||
      !item.it1cd ||
      !item.it2cd ||
      !item.summy ||
      !item.mssec ||
      !item.bsdate ||
      !item.bseccd ||
      !item.buiscd ||
      !item.busim
     );

     if (invalid.length > 0) {
      Alert.alert('', '관/항/목/재원/사업코드/사업명/산출내역을 모두 입력한 행만 저장할 수 있습니다.');
      return;
     }

     // 이미 전표가 생성된 항목 체크
     let alreadyCreated = rows.filter(item =>
      item.acc_spdate_num && item.acc_spdate_num.trim() !== ''
     );

     if (alreadyCreated.length > 0) {
      Alert.alert('', '이미 전표가 생성된 항목이 포함되어 있습니다. 전표가 생성되지 않은 항목만 저장할 수 있습니다.');
      return;
     }

     let saveRows = rows.map(item => {
      return {
       custcd: item.custcd,
       spjangcd: item.spjangcd,
       bnkcode: item.bnkcode,
       fintech_use_num: item.fintech_use_num,
       bank_tran_id: item.bank_tran_id,
       tran_date: item.tran_date ? item.tran_date.replace(/-/g, '') : '',
       inout_type: item.inout_type,
       tran_amt: item.tran_amt,

       subject: item.subject || '',
       acccd: item.acccd || '',
       accnm: item.accnm || '',
       it1cd: item.it1cd || '',
       it1nm: item.it1nm || '',
       it2cd: item.it2cd || '',
       it2nm: item.it2nm || '',
       summy: item.summy || '',

       mssec: item.mssec || '',
       bsdate: item.bsdate || '',
       bseccd: item.bseccd || '',
       buiscd: item.buiscd || '',
       busim: item.busim || '',

       // 백엔드에서 getString(item, "acccd2") 로 받는다면 이렇게 맞춰야 함
       acccd2: item.acccd2 || ''
      };
     });

     let data = {
      items: JSON.stringify(saveRows)
     };

     AjaxUtil.postAsyncData(this.url + '/saveSelected', data, function(res) {
      if (res.success) {
       Notify.success('저장되었습니다.');
       _this.searchMainData();
      } else {
       Alert.alert('', res.message || '저장 실패');
      }
     });
    }


   }//page

   function companyPopupOpenCustom(intputId, hiddenid, hiddenflag){

    const value = document.getElementById(intputId).value;

    let poppage = new PopCompComponentCustom(value);

    let result = AjaxUtil.getSyncData('/api/popup/search_Comp_Custom', { item2 : value, spjangcd : getSpjangcdFromSession() });

    let searchcallback = function (items) {

     document.getElementById(intputId).focus();

     document.getElementById(intputId).value = items.item2;
     document.getElementById(hiddenid).value = items.id;
     document.getElementById(hiddenflag).value = items.cltflag;
    };
    if(result && result.data.length === 1){
     searchcallback(result.data[0]);   ``
     return;
    }

    poppage.show(searchcallback, result.data);
   }
