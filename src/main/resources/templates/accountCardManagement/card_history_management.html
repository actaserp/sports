<th:block layout:fragment="scripts">
  <th:block th:replace="/common/popup_card :: popup_card" />
  <script th:src="@{/js/cycle/CardInputHandler.js}"></script>
  <script type="text/javascript">
   class CardHistoryPage {
    constructor() {
     this.url = '/api/account_management/card_history';
     this.grid = null;
     this.cardSettingGrid = null;
     this.cardSettingPopup = null;
     this.viewData = new wijmo.collections.CollectionView();
     this.cardViewData = new wijmo.collections.CollectionView();
     this.init();
    }
    init() {
     let _this = this;

     // 재원
     this.mssecOptions = AjaxUtil.getSelectDataWithNull('mssec', 'choose');

     this.dicMssec = {};
     $.each(this.mssecOptions, function (idx, item) {
      _this.dicMssec[item.value] = item.text;
     });

      // DataMap 생성
     let mssecMap = new wijmo.grid.DataMap(this.mssecOptions, 'value', 'text');

     _this.grid = new wijmo.grid.FlexGrid('#theGrid_CardHistory', {
      headersVisibility: wijmo.grid.HeadersVisibility.Column,
      autoGenerateColumns: false,
      showMarquee: true,
      allowSorting: 'MultiColumn',
      selectionMode: wijmo.grid.SelectionMode.Cell,
      isReadOnly: false,
      imeEnabled: true,
      frozenColumns: 2,
      formatItem: (s, e) => {
       if (e.panel.cellType === wijmo.grid.CellType.ColumnHeader) {
        const binding = s.columns[e.col].binding;

        // 기본값 먼저 초기화
        e.cell.style.textAlign = 'center';
        e.cell.style.color = '';
        e.cell.style.fontWeight = '';

        // 강조할 헤더만 다시 적용
        if (
         binding === 'busim' ||
         binding === 'accnm' ||
         binding === 'it1nm' ||
         binding === 'it2nm' ||
         binding === 'mssecnm' ||
         binding === 'mssec' ||
         binding === 'summy'  ||
         binding === 'subject' ||
         binding === 'remark'
        ) {
         e.cell.style.color = '#5567ff';
         e.cell.style.fontWeight = 'bold';
        }
       }
      },
      columns: [
       {
        binding: 'selected',
        header: '선택',
        width: 70,
        align: 'center',
        dataType: wijmo.DataType.Boolean,
        isReadOnly: false
       },
       {
        binding: 'slip_cancel_yn',
        header: '전표취소',
        width: 90,
        align: 'center',
        dataType: wijmo.DataType.Boolean,
        isReadOnly: false
       },
       {binding: 'card_no', header: '카드번호',width: 100, align: 'center'},
       {binding: 'biz_no', header: 'userKey', visible: false},
       {binding: 'bnkcode', header: 'bnkcode', visible: false},
       {binding: 'apv_dt', header: '일자', width: 100, align: 'center', isReadOnly: true},
       {binding: 'apv_tm', header: '승인일자', width: 100, align: 'center', isReadOnly: true},
       {binding: 'apv_no', header: '승인', width: 120, align: 'center', isReadOnly: true},
       {binding: 'buy_sum', header: '승인금액', width: 100, align: 'right', format: 'n0', isReadOnly: true},
       {binding: 'sply_amt', header: '공급금액', width: 100, align: 'right', format: 'n0', isReadOnly: true},
       {binding: 'vat_amt', header: '부가세', width: 100, align: 'right', format: 'n0', isReadOnly: true},
       {binding: 'mest_nm', header: '가맹점', width: 160, align: 'left', isReadOnly: true},

       {binding: 'bsdate', header: '사업코드1', visible: false},
       {binding: 'bseccd', header: '사업코드2', visible: false},
       {binding: 'buiscd', header: '사업코드', visible: false},
       {binding: 'busim', header: '사업명', width: 300, align: 'left', isReadOnly: false},
       {binding: 'acccd', header: '관코드', visible: false},
       {binding: 'accnm', header: '관명', width: 150, align: 'left', isReadOnly: false},
       {binding: 'it1cd', header: '항코드',visible: false },
       {binding: 'it1nm', header: '항', width: 150, align: 'left', isReadOnly: false},
       {binding: 'it2cd', header: '목코드', visible: false},
       {binding: 'it2nm', header: '목', width: 150, align: 'left', isReadOnly: false},

       {binding: 'summy', header: '산출내역', width: 200, align: 'left', isReadOnly: false},
       {binding: 'mssec', header: '재원', width: 100, align: 'left', dataMap: mssecMap},
       {binding: 'subject', header: '적요', width: 200, align: 'left', isReadOnly: false},
       {binding: 'remark', header: '비고', width: 200, align: 'left', isReadOnly: false},
       {binding: 'slip_info', header: '전표일자/번호', width: 150, align: 'center', isReadOnly: true},
       {binding: 'pay_cancel_yn', header: '지급전표발행여부', visible: false},
      ],
      itemsSource: this.viewData,
     });

     _this.grid.keyActionEnter = wijmo.grid.KeyAction.None;

     // 재원 수정 완료 시 자동 체크 갱신
     _this.grid.cellEditEnded.addHandler((s, e) => {
      const item = s.rows[e.row]?.dataItem;
      const col = s.columns[e.col];

      if (!item || !col) return;

      if (col.binding === 'mssec') {
       _this.updateRowSelected(item);
       s.collectionView.refresh();
      }
     });

     new FlexGridContextMenu(this.grid);
     _this.grid.downloadFileName = '카드내역';

     // footer 합계행 추가
     _this.grid.columnFooters.rows.push(new wijmo.grid.GroupRow());

     // '일자' 컬럼 위치에 합계 표시
     const apvDtColIndex = _this.grid.columns.findIndex(c => c.binding === 'apv_dt');
     if (apvDtColIndex > -1) {
      _this.grid.columnFooters.setCellData(0, apvDtColIndex, '합계');
     }

     // 금액 컬럼 aggregate 지정
     const buySumCol = _this.grid.columns.getColumn('buy_sum');
     if (buySumCol) {
      buySumCol.aggregate = wijmo.Aggregate.Sum;
     }

     const splyAmtCol = _this.grid.columns.getColumn('sply_amt');
     if (splyAmtCol) {
      splyAmtCol.aggregate = wijmo.Aggregate.Sum;
     }

     const vatAmtCol = _this.grid.columns.getColumn('vat_amt');
     if (vatAmtCol) {
      vatAmtCol.aggregate = wijmo.Aggregate.Sum;
     }

      // 데이터 로드 후 초기 선택 해제
     _this.grid.loadedRows.addHandler(() => {
      setTimeout(() => {
       _this.grid.select(-1, -1);
      }, 0);
     });

     _this.grid.hostElement.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') {
       return;
      }

      const g = _this.grid;
      const sel = g.selection;

      if (!sel || sel.row < 0 || sel.col < 0) {
       return;
      }

      const col = g.columns[sel.col];
      if (!col) {
       return;
      }

      e.preventDefault();

      let item = g.rows[sel.row].dataItem;

      let inputValue = '';
      if (g.activeEditor) {
       inputValue = g.activeEditor.value ? g.activeEditor.value.trim() : '';
      } else {
       inputValue = g.getCellData(sel.row, sel.col, true);
       inputValue = inputValue ? inputValue.toString().trim() : '';
      }

      g.finishEditing();

      // 조회 컬럼 처리
      if (['busim', 'accnm', 'it1nm', 'it2nm'].includes(col.binding)) {
       item[col.binding] = inputValue;

       if (col.binding === 'busim') {
        _this.searchBusim(item, sel.row);
        return;
       }

       if (col.binding === 'accnm') {
        _this.searchAccnm(item, sel.row);
        return;
       }

       if (col.binding === 'it1nm') {
        _this.searchIt1nm(item, sel.row);
        return;
       }

       if (col.binding === 'it2nm') {
        _this.searchIt2nm(item, sel.row);
        return;
       }
      }

      // 산출내역에서 엔터 -> 재원으로 이동 + 콤보 열기
      if (col.binding === 'summy') {
       item[col.binding] = inputValue;
       _this.moveToMssecAndOpen(sel.row);
       return;
      }

      // 재원에서 엔터 -> 적요로 이동
      if (col.binding === 'mssec') {
       _this.moveToCellAndEdit(sel.row, 'subject');
       return;
      }

      // 적요에서 엔터 -> 같은 행의 비고로 이동
      if (col.binding === 'subject') {
       _this.moveToCellAndEdit(sel.row, 'remark');
       return;
      }

    //비고에서 엔터 -> 다음 행 사업명으로 이동
      if (col.binding === 'remark') {
       const nextRow = sel.row + 1;
       if (nextRow < g.rows.length) {
        _this.moveToCellAndEdit(nextRow, 'busim');
       }
       return;
      }

      // 그 외 일반 이동
      const nextPos = _this.findNextEditableCell(sel.row, sel.col);
      if (!nextPos) return;

      g.select(nextPos.row, nextPos.col);
      g.scrollIntoView(nextPos.row, nextPos.col, true);
      g.startEditing(true);
     });

    }//init

    // 사업명 조회
    searchBusim(item, rowIndex) {
     let _this = this;
     let url = '/api/account_management/card_history/findBusim';
     let data = {
      busim: item.busim
     };

     let fnsuccess = function (res) {
      let list = res.data || [];

      if (!list || list.length === 0) {
       Alert.alert('', '사업 조회 결과가 없습니다.');
       return;
      }

      _this.showBusimPopup(list, rowIndex);
     };

     AjaxUtil.getAsyncData(url, data, fnsuccess);
    }

    showBusimPopup(dataList, rowIndex) {
     let _this = this;

     _this.selectedRowIndexForPopup = rowIndex;

     // 기존 팝업이 있으면 제거
     if (_this.busimPopup) {
      _this.busimPopup.close();
      _this.busimPopup = null;
     }

     // 템플릿 HTML 가져오기
     let content = tmpl('businmTemplate', {});

     // 팝업 열기
     _this.busimPopup = new PopupDraggable('사업 조회');
     _this.busimPopup.open({ width: 700, height: 420, $content: $(content) });

     // 팝업 안의 그리드 생성
     _this.businessGrid = new wijmo.grid.FlexGrid('#BusinessGrid', {
      isReadOnly: true,
      selectionMode: wijmo.grid.SelectionMode.Row,
      headersVisibility: wijmo.grid.HeadersVisibility.Column,
      autoGenerateColumns: false,
      columns: [
       { binding: 'bsdate', header: '사업코드1', width: 90, align: 'center' },
       { binding: 'bseccd', header: '사업코드2', width: 90, align: 'center' },
       { binding: 'buiscd', header: '사업코드', width: 90, align: 'center' },
       { binding: 'busim', header: '사업명', width: '*', align: 'left' }
      ],
      itemsSource: new wijmo.collections.CollectionView(dataList)
     });
     // 엔터 키 기본 동작 비활성화
     _this.businessGrid.keyActionEnter = wijmo.grid.KeyAction.None;

     // 공통 선택 함수
     const selectCurrentBusim = function () {
      let sel = _this.businessGrid.selection;
      if (!sel || sel.row < 0) {
       return;
      }

      let selectedItem = _this.businessGrid.rows[sel.row].dataItem;
      _this.applyBusimData(selectedItem, _this.selectedRowIndexForPopup);

      if (_this.busimPopup) {
       _this.busimPopup.close();
       _this.busimPopup = null;
      }

      _this.businessGrid = null;
     };

     // 첫 행 선택 + 포커스
     setTimeout(function () {
      if (_this.businessGrid && _this.businessGrid.rows.length > 0) {
       _this.businessGrid.select(0, 0);
       _this.businessGrid.focus();
      }
     }, 50);

     // 더블클릭 선택
     _this.businessGrid.hostElement.addEventListener('dblclick', function () {
      selectCurrentBusim();
     });

     // Enter 선택
     _this.businessGrid.hostElement.addEventListener('keydown', function (e) {

    //다음칸 이동 공통함수
    moveToCellAndEdit(rowIndex, binding) {
     let g = this.grid;
     const nextCol = g.columns.getColumn(binding);

     if (!nextCol) return;

     setTimeout(() => {
      g.select(rowIndex, nextCol.index);
      g.scrollIntoView(rowIndex, nextCol.index, true);
      g.focus(); // 또는 g.hostElement.focus();
      g.startEditing(true);
     }, 50);
    }

    moveToMssecAndOpen(rowIndex) {
     let g = this.grid;
     const col = g.columns.getColumn('mssec');

     if (!col) return;

     setTimeout(() => {
      g.select(rowIndex, col.index);
      g.scrollIntoView(rowIndex, col.index, true);
      g.focus();
      g.startEditing(true);

      setTimeout(() => {
       const editor = g.activeEditor;
       if (editor) {
        editor.focus();
        editor.dispatchEvent(new Event('click')); // 클릭 이벤트 발생
        editor.dispatchEvent(new KeyboardEvent('keydown', {
         key: 'ArrowDown',
         code: 'ArrowDown',
         keyCode: 40,
         which: 40,
         bubbles: true
        })); // 아래 화살표 키 이벤트 발생
       }
      }, 30);
     }, 50);
    }

    findNextEditableCell(row, col) {
     const g = this.grid;
     const rowCount = g.rows.length;
     const colCount = g.columns.length;

     for (let r = row; r < rowCount; r++) {
      let startCol = (r === row) ? col + 1 : 0;

      for (let c = startCol; c < colCount; c++) {
       if (this.isEditableCell(r, c)) {
        return {row: r, col: c};
       }
      }
     }

     return null;
    }

    isEditableCell(row, col) {
     const g = this.grid;
     const column = g.columns[col];
     const gridRow = g.rows[row];

     if (!column || !gridRow) {
      return false;
     }

     if (column.isReadOnly) {
      return false;
     }

     if (!(gridRow instanceof wijmo.grid.Row)) {
      return false;
     }

     if (!column.visible) {
      return false;
     }

     return true;
    }

    //선택카드 내역 수집 요청
    requestSelectedCardHistory() {
     let _this = this;

     let frDate = ($('#cardCollectFrDate').val() || '').replaceAll('-', '');
     let toDate = ($('#cardCollectToDate').val() || '').replaceAll('-', '');

     if (!frDate || !toDate) {
      Alert.alert('', '수집기간을 입력해주세요.');
      return;
     }

     const frDateObj = new Date(frDate.slice(0,4), frDate.slice(4,6) - 1, frDate.slice(6,8));
     const toDateObj = new Date(toDate.slice(0,4), toDate.slice(4,6) - 1, toDate.slice(6,8));
     const diffDays = Math.floor((toDateObj - frDateObj) / (1000 * 60 * 60 * 24));

     if (diffDays > 199) {
      Alert.alert('', '수집기간은 최대 200일까지 가능합니다.');
      return;
     }

     let selectedCards = this.cardViewData.items.filter(function (item) {
      return item.selected === true;
     });

     if (selectedCards.length === 0) {
      Alert.alert('', '선택된 카드가 없습니다.');
      return;
     }

     let param = {
      searchfrdate: frDate,
      searchtodate: toDate,
      cards: JSON.stringify(selectedCards.map(function (item) {
       return {
        cardnum: item.cardnum,
        baroid: item.baroid
       };
      }))
     };

     AjaxUtil.postAsyncData(this.url + '/requestCardHistory', param, function (res) {
      if (res.success) {
       Notify.success(res.message || '카드내역 수집이 완료되었습니다.');
       _this.searchMainData();

       if (_this.cardSettingPopup && _this.cardSettingPopup.close) {
        _this.cardSettingPopup.close();
       }
      } else {
       Alert.alert('', res.message || '카드내역 수집 중 오류가 발생했습니다.');
      }
     });
    }

     let invalid = rows.filter(item =>

     let saveRows = rows.map(item => {

     let items = _this.viewData ? _this.viewData.items : [];

     if (!selectedItems || selectedItems.length === 0) {
      Alert.alert('', '선택된 데이터가 없습니다.');
      return;
     }

     // pay_cancel_yn이 'Y'인 항목 체크
     let canceledItems = selectedItems.filter(item => item.pay_cancel_yn === 'Y');

     if (canceledItems.length > 0) {

      return;
     }

     // slip_info가 없는 항목 체크 (전표가 생성되지 않은 항목)
     let noSlipItems = selectedItems.filter(item => !item.slip_info || item.slip_info.trim() === '');

     if (noSlipItems.length > 0) {
      Alert.alert('', '전표가 생성되지 않은 항목이 포함되어 있습니다.');
      return;
     }

     Alert.confirm('', '선택한 전표를 취소하시겠습니까?', function(){
      let cancelData = {
       items: JSON.stringify(selectedItems.map(item => ({
        biz_no: item.biz_no,
        card_no: item.card_no,
        apv_dt: item.apv_dt,
        apv_no: item.apv_no,
        slip_info: item.slip_info
       })))
      };

      let fnsuccess = function(res){
       if(res.success){
        Notify.success('전표가 취소되었습니다.');
        _this.searchMainData(); // 재조회
       } else {
        Alert.alert('', res.message || '전표 취소에 실패했습니다.');
       }
      };

      AjaxUtil.postAsyncData(_this.url + '/cancelSlip', cancelData, fnsuccess);
     });
    }

   }//page
