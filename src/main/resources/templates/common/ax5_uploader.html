<th:block th:fragment="ax5_uploader">
<script type="text/x-tmpl" id="ax5_file_upload_template">
    <div data-ax5uploader="fileuploadAx" class="fileuploaddiv" id="{%=o.divFileUpload%}">
        <span class="fileuploadTitle"></span>
        <input type="hidden" class="btn " data-ax5uploader-button="selector" id ="addFile" />
        <button class="btn " id ="{%=o.btnRemoveAllFile%}" >м „мІҙмӮӯм ң</button>
        <div data-uploaded-box="fileuploadAx" data-ax5uploader-uploaded-box="inline" id="{%=o.fileUploadBox%}"></div>
        <input type="hidden" id="{%=o.inputFileId%}" name="srchFileId" />
        <input type="hidden" id="{%=o.inputDataPk%}" name="DataPk"/>
    </div>
</script>

<script th:inline="javascript" type="text/javascript">
    class ax5FileUploadClass {
        constructor(div_name, data_pk, option) {
            this.data_pk = data_pk;
            this.file_id_list = [];
            this.table_name = option.table_name;
            this.attach_name = option.attach_name;
            this.accept_files = option.accept_files;
            this.multiple = option.multiple;
            this.max_count = option.max_count;
            this.file_size = option.file_size;
            this.thumb_nail = option.thumb_nail;
            this.upload_callback = option.upload_callback;
            this.delete_callback = option.delete_callback;
            this.file_click_callback = option.file_click_callback;
            this._uploadCompleting = false;
            this._pendingFiles = []; // manual_upload лӘЁл“ң: м ҖмһҘ м „к№Ңм§Җ лҢҖкё°н•ҳлҠ” нҢҢмқј лӘ©лЎқ
            this.can_write = option.can_write;
            // true: м ҖмһҘ лІ„нҠј нҒҙлҰӯ мӢң м—…лЎңл“ң (мӢ к·ң л“ұлЎқ лҸҷмӢңм„ұ л¬ём ң л°©м§Җ)
            this.manual_upload = option.manual_upload !== undefined ? option.manual_upload : false;

            if (!this.attach_name)   this.attach_name   = 'basic';
            if (!this.accept_files)  this.accept_files  = 'zip,pdf,doc,docx,xls,xlsx,ppt,pptx';
            if (!this.multiple)      this.multiple      = true;
            if (!this.max_count)     this.max_count     = 10;
            if (!this.file_size)     this.file_size     = 20;
            if (!this.thumb_nail)    this.thumb_nail    = 'N';
            if (this.can_write === undefined) this.can_write = true;

            this.base_url    = '/api/common/attach_file';
            this.upload_url  = withCtx('/api/files/upload');
            this.download_url = withCtx('/api/files/download');
            this.downzip_url = '/api/files/downzip';

            this.divFileUpload    = option.divFileUpload    || 'fileUploadDiv';
            this.btnAddFile       = option.btnAddFile       || 'addFile';
            this.btnDownloadAllFile = option.btnDownloadAllFile || 'downloadFileAll';
            this.btnRemoveAllFile = option.btnRemoveAllFile || 'removeFileAll';
            this.fileUploadBox    = option.fileUploadBox    || 'fileUploadBox';
            this.inputFileId      = option.inputFileId      || 'srchFileId';
            this.inputDataPk      = option.inputDataPk      || 'DataPk';

            let data = {
                divFileUpload: this.divFileUpload,
                btnAddFile: this.btnAddFile,
                btnDownloadAllFile: this.btnDownloadAllFile,
                btnRemoveAllFile: this.btnRemoveAllFile,
                fileUploadBox: this.fileUploadBox,
                inputFileId: this.inputFileId,
                inputDataPk: this.inputDataPk,
            };

            let html = tmpl('ax5_file_upload_template', data);
            $('#' + div_name).html(html);
            $('#' + this.inputDataPk).val(this.data_pk);
            this.init();
        }

        init() {
            let _this = this;
            if (_this.UPLOAD) _this.UPLOAD = null;

            $('#' + _this.btnRemoveAllFile).off('click');
            $('#' + _this.btnDownloadAllFile).off('click');

            let disabled = !_this.can_write;
            $('#' + _this.btnAddFile).prop('disabled', disabled);
            $('#' + _this.btnRemoveAllFile).prop('disabled', disabled);

            let accept = '.' + _this.accept_files.split(',').join(',.');
            let $target = $('#' + _this.divFileUpload);

            let myconfig = {
                fileSize: _this.file_size,
                maxcnt: _this.max_count,
                accept: accept,
                accepts: _this.accept_files,
                dropZone: _this.can_write ? 'fileuploadAx' : '',
                boxZone: 'fileuploadAx',
                icons: {
                    'download': '<i class="fa fa-download" aria-hidden="true"></i>',
                    'delete': '<i class="fa fa-minus-circle" aria-hidden="true"></i>'
                },
                emptymsg: _this.can_write ? 'нҢҢмқјмқ„ Drag&amp;Dropн•ҳкұ°лӮҳ нҒҙлҰӯн•ҳм—¬ м—…лЎңл“ңлҘј м§„н–үн•ҳм„ёмҡ”' : 'нҢҢмқј м—…лЎңл“ң к¶Ңн•ңмқҙ м—ҶмҠөлӢҲлӢӨ.',
                addfileext: 'Y',
                tableName: _this.table_name,
                attachName: _this.attach_name,
                thumb_nail: 'N',
            };
            _this.myconfig = myconfig;

            let iconPath = /*[[@{/images/icon/ico-fileupload.svg}]]*/ '';
            let emptyListMsg = '<div class="upload-filebox" style="padding: 10px;"><img src="' + iconPath + '" alt="м—…лЎңл“ңм•„мқҙмҪҳ"><a class="btn" title="нҢҢмқјм—…лЎңл“ң">нҢҢмқј м—…лЎңл“ң</a>' + myconfig.emptymsg + '</div>';
            if (myconfig.dropZone === '') {
                emptyListMsg = '<div class="text-center" style="padding: 10px;">' + myconfig.emptymsg + '</div>';
            }

            let DIALOG = new ax5.ui.dialog({ title: 'нҢҢмқјм—…лЎңл“ң' });
            _this.DIALOG = DIALOG;

            $target.children('span.fileuploadTitle').html(
                '<span>мІЁл¶ҖнҢҢмқј</span> [' + accept + '] [1к°ңлӢ№ мөңлҢҖSize: ' + _this.file_size + 'MB, мөңлҢҖнҢҢмқјмҲҳ: ' + _this.max_count + 'к°ң]'
            );

            let folder_name = _this.table_name || '';
            let upload_uri = _this.upload_url + '?tableName=' + _this.table_name;
            let _dataPk = (_this.data_pk == null || isNaN(Number(_this.data_pk))) ? 0 : Number(_this.data_pk);
            upload_uri += '&DataPk=' + _dataPk
                + '&attachName=' + _this.attach_name
                + '&accepts=' + _this.accept_files
                + '&fileSize=' + _this.file_size
                + '&addfileext=' + myconfig.addfileext
                + '&others=' + folder_name
                + '&thumbnailYN=' + _this.thumb_nail;

            try {
                _this.UPLOAD = new ax5.ui.uploader({
                    debug: false,
                    target: $target,
                    form: { action: encodeURI(upload_uri), fileName: 'uploadfile' },
                    accept: myconfig.accept,
                    multiple: _this.multiple,
                    // manual_upload лӘЁл“ң: send()лҘј мһҗлҸҷ нҳём¶ң(false)н•ҳлҗҳ validateSelectedFilesм—җм„ң м°ЁлӢЁ
                    // вҶ’ нҢҢмқј м„ нғқ мҰүмӢң кІҖмҰқ мӢӨн–ү к°ҖлҠҘ, progressBoxлҠ” мҲЁкІЁ нҢқм—… м—ҶмқҢ
                    manualUpload: false,
                    progressBox: !_this.manual_upload,
                    progressBoxDirection: 'left',
                    dropZone: {
                        target: $('[data-uploaded-box="' + myconfig.dropZone + '"]')
                    },
                    uploadedBox: {
                        target: $('[data-uploaded-box="' + myconfig.boxZone + '"]'),
                        icon: myconfig.icons,
                        columnKeys: {
                            name: 'fileNm', type: 'fileExt', size: 'fileSize',
                            uploadedName: 'fileNm', uploadedPath: '', downloadPath: '',
                            previewPath: '', thumbnail: ''
                        },
                        lang: {
                            supportedHTML5_emptyListMsg: emptyListMsg,
                            emptyListMsg: '<div class="text-center" style="padding-top:30px;">Empty of List.</div>'
                        },
                        onchange: function () {
                            // ax5к°Җ uploadedBoxлҘј к°ұмӢ н•  л•Ңл§ҲлӢӨ лҢҖкё° нҢҢмқј лӘ©лЎқ лӢӨмӢң н‘ңмӢң
                            if (_this.manual_upload) _this._showPendingFiles();
                            _this._syncEmptyMsg();
                        },
                        onclick: function () {
                            let fileIndex = this.fileIndex;
                            let file = _this.UPLOAD.uploadedFiles[fileIndex];
                            switch (this.cellType) {
                                case 'delete':
                                    if (!_this.can_write) {
                                        Alert.alert('нҢҢмқј мӮӯм ң', 'к¶Ңн•ңмқҙ м—ҶмҠөлӢҲлӢӨ.');
                                        return;
                                    }
                                    DIALOG.confirm(
                                        { title: 'мӮӯм ң', msg: 'н•ҙлӢ№ нҢҢмқјмқ„ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?', autoCloseTime: 10000 },
                                        function () {
                                            if (this.key !== 'ok') return;
                                            if (_this.deleteFile(fileIndex)) {
                                                DIALOG.close();
                                                _this.getFileIds();
                                                _this._syncEmptyMsg();
                                                Notify.success('нҢҢмқјмқҙ мӮӯм ңлҗҳм—ҲмҠөлӢҲлӢӨ.');
                                            }
                                        }
                                    );
                                    break;
                                case 'download':
                                    if (file) {
                                        AjaxUtil.downloadFile(_this.download_url + '?file_id=' + file.fileId, file.fileNm);
                                    }
                                    break;
                                case 'filename':
                                    _this.file_click_callback(file.fileId);
                            }
                        }
                    },
                    validateSelectedFiles: function () {
                        if (!_this.can_write) {
                            Alert.alert('нҢҢмқј м—…лЎңл“ң мҳӨлҘҳ', 'к¶Ңн•ңмқҙ м—ҶмҠөлӢҲлӢӨ.');
                            return false;
                        }
                        // нҢҢмқј нҒ¬кё° мІҙнҒ¬
                        let maxBytes = _this.file_size * 1024 * 1024;
                        for (let i = 0; i < this.selectedFiles.length; i++) {
                            let f = this.selectedFiles[i];
                            if (f && f[0]) f = f[0];
                            if (f && f.size > maxBytes) {
                                Alert.alert('', 'нҢҢмқј нҒ¬кё°к°Җ ' + _this.file_size + 'MBлҘј мҙҲкіјн•©лӢҲлӢӨ.');
                                return false;
                            }
                        }
                        // мөңлҢҖ нҢҢмқј мҲҳ мІҙнҒ¬ (м—…лЎңл“ң мҷ„лЈҢ + лҢҖкё° мӨ‘ + мӢ к·ң)
                        if (this.uploadedFiles.length + _this._pendingFiles.length + this.selectedFiles.length > _this.max_count) {
                            Alert.alert('', _this.max_count + 'к°ң мқҙмғҒмқҳ нҢҢмқјмқ„ м—…лЎңл“ңн•  мҲҳ м—ҶмҠөлӢҲлӢӨ.');
                            return false;
                        }

                        if (_this.manual_upload) {
                            // нҢҢмқјмқ„ лҢҖкё°м—ҙлЎң мқҙлҸҷ, fileUploadBoxм—җ н‘ңмӢң, ax5 м—…лЎңл“ң м°ЁлӢЁ
                            _this._pendingFiles.push(...this.selectedFiles);
                            this.selectedFiles.splice(0); // мӨ‘ліө л°©м§Җ
                            _this._showPendingFiles();
                            return false;
                        }
                        return true;
                    },
                    onprogress: function () {},
                    onuploaderror: function () {
                        Alert.alert('м—…лЎңл“ң мҳӨлҘҳ', _this.UPLOAD.statusText);
                    },
                    onuploaded: function () {},
                    onuploadComplete: function () {
                        if (_this._uploadCompleting) return;
                        _this._uploadCompleting = true;
                        _this.getFileIds();
                        let file_id = _this.file_id_list[_this.file_id_list.length - 1];
                        _this.upload_callback(file_id);
                        _this._uploadCompleting = false;
                    }
                });
            } catch (ex) {
                console.error('[ax5FileUploadClass] init мҳӨлҘҳ:', ex);
            }

            $('#' + _this.btnDownloadAllFile).on('click', function () {
                if (_this.UPLOAD.uploadedFiles.length > 0) {
                    _this.DIALOG.confirm(
                        { title: 'м „мІҙ лӢӨмҡҙлЎңл“ң', msg: 'zipмңјлЎң м••м¶•н•ҳм—¬ лӢӨмҡҙлЎңл“ңн•ҳмӢңкІ мҠөлӢҲк№Ң?' },
                        function () {
                            if (this.key !== 'ok') return;
                            location.href = _this.downzip_url + '?file_ids=' + $('#' + _this.inputFileId).val();
                        }
                    );
                }
            });

            $('#' + _this.btnRemoveAllFile).on('click', function () {
                if (!_this.can_write) {
                    Alert.alert('нҢҢмқј мӮӯм ң', 'к¶Ңн•ңмқҙ м—ҶмҠөлӢҲлӢӨ.');
                    return;
                }
                let uploadedCount = _this.UPLOAD.uploadedFiles.length;
                let pendingCount  = _this._pendingFiles.length;
                if (uploadedCount === 0 && pendingCount === 0) return;

                _this.DIALOG.confirm(
                    { title: 'м „мІҙ нҢҢмқј мӮӯм ң', msg: 'лӘЁл“  нҢҢмқјмқ„ мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?' },
                    function () {
                        if (this.key !== 'ok') return;
                        for (let i = uploadedCount - 1; i >= 0; i--) _this.deleteFile(i);
                        _this.getFileIds();
                        _this._pendingFiles = [];
                        _this._showPendingFiles();
                    }
                );
            });

            $('#' + _this.fileUploadBox).show();
            _this.getAttachFiles();
        }

        deleteFile(fileIndex) {
            let _this = this;
            let file = _this.UPLOAD.uploadedFiles[fileIndex];
            let result = AjaxUtil.postSyncData(_this.base_url + '/deleteFile', {
                fileId: file.fileId,
                tableName: file.TableName,
                physicFileName: file.AttachName
            });
            if (result && result.success) {
                _this.UPLOAD.removeFile(fileIndex);
                return true;
            }
            return false;
        }

        getFileIds() {
            let _this = this;
            let fileIds = '';
            _this.file_id_list = [];
            $.each(_this.UPLOAD.uploadedFiles, function (i, item) {
                _this.file_id_list.push(item.fileId);
                fileIds += (i === 0 ? '' : ',') + item.fileId;
            });
            $('#' + _this.inputFileId).val(fileIds);
            return fileIds;
        }

        getAttachFiles() {
            let _this = this;
            _this.data_pk = (isNaN(Number(_this.data_pk)) || _this.data_pk == null) ? 0 : Number(_this.data_pk);
            if (_this.data_pk <= 0) {
                _this.UPLOAD.setUploadedFiles([]);
                return;
            }
            let result = AjaxUtil.getSyncData(_this.base_url + '/detailFiles', {
                TableName: _this.table_name,
                DataPk: _this.data_pk,
                attachName: _this.attach_name
            });
            if (_this.UPLOAD && result) {
                _this.UPLOAD.setUploadedFiles(result.data);
                _this.getFileIds();
            }
        }

        imageUri(file_id) {
            return file_id ? this.download_url + '?file_id=' + file_id + '&t=' + Date.now() : '';
        }
        showFirstImage(imgTag) {
            if (this.file_id_list.length > 0)
                $('#' + imgTag).attr('src', this.imageUri(this.file_id_list[0]));
        }
        showLastImage(imgTag) {
            let len = this.file_id_list.length;
            if (len > 0) $('#' + imgTag).attr('src', this.imageUri(this.file_id_list[len - 1]));
        }
        showImage(imgTag, file_id) {
            $('#' + imgTag).attr('src', this.imageUri(file_id));
        }

        // нҢҢмқјмқҙ н•ҳлӮҳлқјлҸ„ мһҲмңјл©ҙ л№Ҳ м•ҲлӮҙ л©”мӢңм§Җ мҲЁк№Җ, м—Ҷмңјл©ҙ н‘ңмӢң
        _syncEmptyMsg() {
            let _this = this;
            let $box = $('[data-uploaded-box="' + _this.myconfig.boxZone + '"]');
            let hasFiles = (_this.UPLOAD && _this.UPLOAD.uploadedFiles.length > 0)
                         || _this._pendingFiles.length > 0;
            $box.find('.upload-filebox').toggle(!hasFiles);
        }

        // лҢҖкё° мӨ‘мқё нҢҢмқј лӘ©лЎқмқ„ fileUploadBox м•Ҳм—җ н‘ңмӢң (ax5к°Җ л°•мҠӨлҘј к°ұмӢ н•ҙлҸ„ onchangeлЎң мһ¬нҳём¶ңлҗЁ)
        _showPendingFiles() {
            let _this = this;
            let $box = $('[data-uploaded-box="' + _this.myconfig.boxZone + '"]');
            $box.find('.ax5-pending-item').remove();
            _this._pendingFiles.forEach(function (f, i) {
                let file = (f && f[0]) ? f[0] : f;
                let name = (file && file.name) ? file.name : 'нҢҢмқј';
                let size = file ? (file.size > 1024 * 1024
                    ? (file.size / 1024 / 1024).toFixed(1) + ' MB'
                    : Math.round(file.size / 1024) + ' KB') : '';
                let $item = $([
                    '<div class="ax5-pending-item" data-pending-idx="' + i + '" style="',
                    'display:flex;align-items:center;padding:6px 10px;border-bottom:1px solid #f0f0f0;gap:8px;">',
                    '<span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">',
                    '&#128206; ' + name + '</span>',
                    '<span style="font-size:11px;color:#999;white-space:nowrap;">' + size + '</span>',
                    '<div style="width:80px;height:4px;background:#e8e8e8;border-radius:2px;flex-shrink:0;">',
                    '<div class="ax5-pending-bar" style="height:100%;width:0%;background:#5b9bd5;border-radius:2px;transition:width 0.15s;"></div>',
                    '</div>',
                    '<a href="javascript:void(0)" data-idx="' + i + '"',
                    ' style="color:#c00;font-size:16px;line-height:1;flex-shrink:0;text-decoration:none;">&times;</a>',
                    '</div>'
                ].join(''));
                $item.find('a').on('click', function () {
                    _this._pendingFiles.splice(parseInt($(this).data('idx')), 1);
                    _this._showPendingFiles();
                });
                $box.append($item);
            });
            _this._syncEmptyMsg();
        }

        // м ҖмһҘ м„ұкіө нӣ„ мӢӨм ң bbsseqлЎң нҢҢмқј м—…лЎңл“ң (XHR + мӢӨмӢңк°„ м§„н–үлҘ )
        // мӮ¬мҡ©лІ•: uploader.uploadNow(savedId, afterSave)
        uploadNow(bbsseq, callback) {
            let _this = this;
            let files = [..._this._pendingFiles];
            if (!files.length) { if (callback) callback(); return; }

            let uploadUrl = _this.upload_url
                + '?tableName=' + _this.table_name
                + '&DataPk=' + bbsseq
                + '&attachName=' + _this.attach_name
                + '&accepts=' + _this.accept_files
                + '&fileSize=' + _this.file_size
                + '&addfileext=' + (_this.myconfig ? _this.myconfig.addfileext : 'Y')
                + '&others=' + _this.table_name
                + '&thumbnailYN=' + (_this.thumb_nail || 'N');

            let $box = $('[data-uploaded-box="' + _this.myconfig.boxZone + '"]');

            function uploadNext(i) {
                if (i >= files.length) {
                    _this._pendingFiles = [];
                    if (callback) callback();
                    return;
                }
                let f = files[i];
                if (f && f[0]) f = f[0];

                // н•ҙлӢ№ мқёлҚұмҠӨмқҳ м§„н–ү л°”
                let $bar = $box.find('[data-pending-idx="' + i + '"] .ax5-pending-bar');

                let fd = new FormData();
                fd.append('uploadfile', f);

                let xhr = new XMLHttpRequest();
                xhr.upload.addEventListener('progress', function (e) {
                    if (e.lengthComputable) {
                        $bar.css('width', Math.round(e.loaded / e.total * 100) + '%');
                    }
                });
                xhr.addEventListener('load', function () {
                    $bar.css({ width: '100%', background: '#52c41a' }); // мҷ„лЈҢ: мҙҲлЎқ
                    uploadNext(i + 1);
                });
                xhr.addEventListener('error', function () {
                    $bar.css({ background: '#ff4d4f' }); // мӢӨнҢЁ: л№Ёк°•
                    console.error('[uploadNow] нҢҢмқј м—…лЎңл“ң мӢӨнҢЁ:', f.name);
                    uploadNext(i + 1);
                });
                xhr.open('POST', encodeURI(uploadUrl));
                xhr.send(fd);
            }

            uploadNext(0);
        }
    }
</script>
</th:block>
