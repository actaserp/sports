<th:block layout:fragment="scripts">
  <script src="/js/cycle/AccountInputHandler.js"></script>
  <script type="text/javascript">
   class CardHistoryPage {
    constructor() {
     this.url = '/api/account_management/card_assignment';
     this.grid = null;
     this.cardSettingGrid = null;
     this.cardSettingPopup = null;
     this.viewData = new wijmo.collections.CollectionView();
     this.cardViewData = new wijmo.collections.CollectionView();
     this.init();
    }
    init() {
     let _this = this;

     // 재원
     this.mssecOptions = AjaxUtil.getSelectDataWithNull('mssec', 'choose');

     let dicMssec = {};
     $.each(this.mssecOptions, function (idx, item) {
      dicMssec[item.value] = item.text;
     });

     // DataMap 생성
     let mssecMap = new wijmo.grid.DataMap(this.mssecOptions, 'value', 'text');

     _this.grid = new wijmo.grid.FlexGrid('#theGrid_CardHistory', {
      autoGenerateColumns: false,
      showMarquee: true,
      allowSorting: 'MultiColumn',
      selectionMode: wijmo.grid.SelectionMode.Cell,
      isReadOnly: false,
      imeEnabled: true,
      formatItem: (s, e) => {
       if (e.panel.cellType === wijmo.grid.CellType.ColumnHeader) {
        // 기본값 먼저 초기화
        e.cell.style.textAlign = 'center';
        e.cell.style.color = '';
        e.cell.style.fontWeight = '';
       }
      },
      columns: [
       {binding: 'apv_dt', header: '일자', width: 100, align: 'center', isReadOnly: true},
       {binding: 'apv_no', header: '입출구분', width: 120, align: 'center', isReadOnly: true},
       {binding: 'apv_tm', header: '입금액', width: 100, align: 'right', isReadOnly: true},
       {binding: '', header: '적요', width: 230, align: 'left', isReadOnly: true},
       {binding: 'acccd', header: '관코드', visible: false},
       {binding: 'accnm', header: '관명', width: 100, align: 'left', isReadOnly: true},
       {binding: 'it1cd', header: '항코드',visible: false },
       {binding: 'it1nm', header: '항', width: 100, align: 'left', isReadOnly: true},
       {binding: 'it2cd', header: '목코드', visible: false},
       {binding: 'it2nm', header: '목', width: 100, align: 'left', isReadOnly: true},
       {binding: 'summy', header: '산출내역', width: 140, align: 'left', isReadOnly: true},

       {binding: '', header: '제목', width: 250, align: 'left', isReadOnly: true},
       {binding: '', header: '발행여부', width: 160, align: 'left', isReadOnly: true},
       {binding: '', header: '전표일자/번호', width: 160, align: 'left', isReadOnly: true},
       {
        binding: 'slip_cancel_yn',
        header: '전표취소',
        width: 90,
        align: 'center',
        dataType: wijmo.DataType.Boolean,
        isReadOnly: false
       }
      ],
      itemsSource: this.viewData,
     });

     _this.grid.keyActionEnter = wijmo.grid.KeyAction.None;

     new FlexGridContextMenu(this.grid);
     _this.grid.downloadFileName = '저표분개 내역';

     // footer 합계행 추가
     _this.grid.columnFooters.rows.push(new wijmo.grid.GroupRow());

     // '일자' 컬럼 위치에 합계 표시
     const apvDtColIndex = _this.grid.columns.findIndex(c => c.binding === 'apv_dt');
     if (apvDtColIndex > -1) {
      _this.grid.columnFooters.setCellData(0, apvDtColIndex, '합계');
     }

     // 금액 컬럼 aggregate 지정
     const apv_tmCol = _this.grid.columns.getColumn('apv_tm');
     if (apv_tmCol) {
      apv_tmCol.aggregate = wijmo.Aggregate.Sum;
     }

     // 데이터 로드 후 초기 선택 해제
     _this.grid.loadedRows.addHandler(() => {
      setTimeout(() => {
       _this.grid.select(-1, -1);
      }, 0);
     });

    }//init

    searchMainData() {
     let _this = this;
     let url = this.url + '/read';

     let start = $('#searchfrdate').val();
     let end = $('#searchtodate').val();

     let data = {
      'start': start,
      'end': end,
      accountName: $('#accountName').val(),
      tradetype: $('#tradetype').val(),

     };

     let fnsuccess = function (result) {
      if (result != null) {
       _this.viewData.sourceCollection = result.data;
      }
     };
     AjaxUtil.getAsyncData(url, data, fnsuccess);

    }

    openCardSettingPopup() {
     let _this = this;
     let content = tmpl('cardSettingTemplate', {});
     let $content = $(content);

     _this.cardSettingPopup = new PopupDraggable('카드 연동 설정');
     _this.cardSettingPopup.open({
      width: 950,
      height: 500,
      $content: $content
     });

     _this.initCardSettingGrid();
     _this.bindCardSettingEvents();

     $('#cardCollectFrDate').val($('#searchfrdate').val());
     $('#cardCollectToDate').val($('#searchtodate').val());

     _this.loadBaroCardList();
    }

    bindCardSettingEvents() {
     let _this = this;

     $('#btnLoadBaroCardList').off('click').on('click', function () {
      _this.loadBaroCardList();
     });

     $('#btnRequestSelectedCardHistory').off('click').on('click', function () {
      _this.requestSelectedCardHistory();
     });
    }

    initCardSettingGrid() {
     let _this = this;

     _this.cardViewData = new wijmo.collections.CollectionView([]);

     _this.cardSettingGrid = new wijmo.grid.FlexGrid('#cardSettingGrid', {
      autoGenerateColumns: false,
      showMarquee: true,
      allowSorting: 'MultiColumn',
      selectionMode: wijmo.grid.SelectionMode.Row,
      isReadOnly: false,
      imeEnabled: true,
      columns: [
       { binding: 'selected', header: '선택', width: 70, align: 'center', dataType: wijmo.DataType.Boolean, isReadOnly: false },
       { binding: 'cardnum', header: '카드번호', width: '*', align: 'center', isReadOnly: true },
       { binding: 'cardnm', header: '카드명', width: 180, align: 'left', isReadOnly: true },
       { binding: 'cardco', header: '카드사', width: 120, align: 'center', isReadOnly: true },
       // { binding: 'cardperson', header: '카드소유자', width: 120, align: 'center', isReadOnly: true },
       { binding: 'baroid', header: '바로빌ID', width: '*', align: 'center', isReadOnly: true },
       // { binding: 'useyn', header: '사용여부', width: 80, align: 'center', isReadOnly: true }
      ],
      itemsSource: _this.cardViewData
     });

     new FlexGridContextMenu(_this.cardSettingGrid);
     _this.cardSettingGrid.downloadFileName = '연동카드목록';

     // footer 필요하면
     _this.cardSettingGrid.columnFooters.rows.push(new wijmo.grid.GroupRow());
     const cardnumColIndex = _this.cardSettingGrid.columns.findIndex(c => c.binding === 'cardnum');
     if (cardnumColIndex > -1) {
      _this.cardSettingGrid.columnFooters.setCellData(0, cardnumColIndex, '선택');
     }

     _this.cardSettingGrid.hostElement.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
       const sel = _this.cardSettingGrid.selection;
       if (!sel || sel.row < 0 || sel.col < 0) return;

       const col = _this.cardSettingGrid.columns[sel.col];
       const item = _this.cardSettingGrid.rows[sel.row].dataItem;

       if (col.binding === 'selected') {
        item.selected = !item.selected;
        _this.cardSettingGrid.invalidate();
        e.preventDefault();
       }
      }
     });
    }

    loadBaroCardList() {
     let _this = this;

     AjaxUtil.getAsyncData(this.url + '/baroCardList', {}, function (res) {
      let ok = res && (res.success === true || Array.isArray(res.data));

      if (ok) {
       let list = Array.isArray(res.data) ? res.data : [];
       let data = list.map(function (item) {
        return {
         selected: false,
         cardnum: item.cardnum || '',
         cardnm: item.cardnm || '',
         cardco: item.cardco || '',
         cardperson: item.cardperson || '',
         baroid: item.baroid || '',
         useyn: item.useyn || ''
        };
       });

       _this.cardViewData = new wijmo.collections.CollectionView(data);
       _this.cardSettingGrid.itemsSource = _this.cardViewData;
       _this.cardSettingGrid.refresh();

       console.log('grid rows = ', _this.cardSettingGrid.rows.length);

       if (_this.cardSettingGrid.rows.length > 0) {
        _this.cardSettingGrid.select(0, 0);
       }
      } else {
       Alert.alert('', res.message || '카드목록 조회 중 오류가 발생했습니다.');
      }
     });
    }

    //선택카드 내역 수집 요청
    requestSelectedCardHistory() {
     let _this = this;

     let frDate = ($('#cardCollectFrDate').val() || '').replaceAll('-', '');
     let toDate = ($('#cardCollectToDate').val() || '').replaceAll('-', '');

     if (!frDate || !toDate) {
      Alert.alert('', '수집기간을 입력해주세요.');
      return;
     }

     let selectedCards = this.cardViewData.items.filter(function (item) {
      return item.selected === true;
     });

     if (selectedCards.length === 0) {
      Alert.alert('', '선택된 카드가 없습니다.');
      return;
     }

     let param = {
      searchfrdate: frDate,
      searchtodate: toDate,
      cards: JSON.stringify(selectedCards.map(function (item) {
       return {
        cardnum: item.cardnum,
        baroid: item.baroid
       };
      }))
     };

     AjaxUtil.postAsyncData(this.url + '/requestCardHistory', param, function (res) {
      if (res.success) {
       Notify.success(res.message || '카드내역 수집이 완료되었습니다.');
       _this.searchMainData();

       if (_this.cardSettingPopup && _this.cardSettingPopup.close) {
        _this.cardSettingPopup.close();
       }
      } else {
       Alert.alert('', res.message || '카드내역 수집 중 오류가 발생했습니다.');
      }
     });
    }

   }//page

   let page = null;

   $(document).ready(function (e) {
    page = new CardHistoryPage();

    let fr = new Date();
    fr.setDate(1);
    fr.setMonth(fr.getMonth() - 1);

    $('#searchfrdate').val(CommonUtil.formatYYYYMMDD(fr));
    $('#searchtodate').val(getNowDate());

    page.searchMainData();

    $('#btnSearch').on('click', function () {
     page.searchMainData();
    });

    //설정버튼 클릭
    $('#btnSetting').on('click', function () {
     page.openCardSettingPopup();
    });

    AccountInputHandler.bind({
     accnumSelector: '#accountName',
     accidSelector: '#accountNameHidden',
     minLength: 2 // 최소 검색 길이 조절 가능
    });

   })
  </script>
</th:block>
</html>
