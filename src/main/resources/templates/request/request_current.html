    <style>
        .radio-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .radio-wrap input[type="radio"] {
            appearance: none;
            -webkit-appearance: none; /* 사파리용 */
            width: 16px;
            height: 16px;

            border-radius: 50%;
            position: relative;
            cursor: pointer;
        }

        .radio-wrap input[type="radio"]::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 8px;
            height: 8px;
            background-color: #666;
            border-radius: 50%;
            opacity: 0;
            transition: 0.2s;
        }

        .radio-wrap input[type="radio"]:checked::after {
            opacity: 1;
        }
    </style>

    <!-- Toast UI Editor CSS -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <!-- Toast UI Editor JS -->
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>

    <script type="text/javascript">


        let sales_type = [];
        let LoadingFlag = false;
        let editor;
        class SalesList {
            constructor() {
                this.grid1 = null;
                this.url = '/api/request_current';
                this.$btnAddNew = $('#btnAddNew');


                this.viewData = new wijmo.collections.CollectionView();


                $('#searchfrdate2').val(getNowDateMinus7());
                $('#searchDate, #searchtodate2').val(getNowDate());
                AjaxUtil.fillSelectOptions($('#reqType2'), 'system_code', 'all', false, 'asdv');
                AjaxUtil.fillSelectOptions($('#fixflag'), 'system_code', 'choose', false, 'asdv');
                AjaxUtil.fillSelectOptions($('#recyn'), 'system_code', 'all', false, 'recyn');

                this.init();
            }

            init() {
                let _this = this;

                const cv = _this.viewData

                // 3. FlexGrid 생성
                this.grid1 = new wijmo.grid.FlexGrid('#theGrid_reqList', {
                    autoGenerateColumns: false,
                    showMarquee: true,
                    allowSorting: 'MultiColumn',
                    selectionMode: wijmo.grid.SelectionMode.Row,
                    isReadOnly: true,
                    columns: [
                        { binding: 'id', header: 'ID', visible: false },
                        { binding: 'asdate', header: '요청일자', align: 'center', width: 120 },
                        { binding: 'cltnm', header: '업체명', align: 'left', width: 150 },
                        { binding: 'usernm', header: '요청자', align: 'left', width: 120},
                        { binding: 'retitle', header: '제목', align: 'left', width: '*' },
                        { binding: 'asdv_nm', header: '요청구분', align: 'center', width: 120 },
                        { binding: 'asmenu', header: '화면명', align: 'left', width: 150 },
                        { binding: 'aspernm', header: '본사담당', align: 'left', width: 120 },
                        { binding: 'recyn_nm', header: '진행구분', align: 'center', width: 120 },
                        // { binding: 'hasProcess', header: '처리여부', align: 'center', width: 100 },
                        { binding: 'recdate', header: '접수일자', align: 'center', width: 150 },
                        { binding: 'as_file', header: '첨부파일', align: 'center', width: 120 },
                    ],
                    itemsSource: cv,
                    // ✅ 파일 다운로드 컬럼 표시
                    formatItem: (s, e) => {
                        if (e.panel.cellType === wijmo.grid.CellType.Cell) {
                            const col = s.columns[e.col];
                            const item = s.rows[e.row].dataItem;

                            // 🔹 as_file 컬럼이 있고 값이 존재할 때만 "다운로드" 링크 표시
                            if (col.binding === 'as_file' && item && item.as_file) {
                                const safeFileName = item.as_file.replace(/"/g, '&quot;'); // XSS 방지
                                e.cell.innerHTML = `
                                    <a href="#" class="file-download" data-file="${safeFileName}" style="
                                        color: #007BFF;
                                        text-decoration: underline;
                                        cursor: pointer;
                                    ">다운로드</a>
                                `;
                            }
                        }
                    },
                });
                this.grid1.rowHeaders.columns.splice(0, 1);
                new FlexGridContextMenu(this.grid1);
                this.grid1.downloadFileName = '요청사항_처리현황';

                // ✅ 다운로드 클릭 이벤트
                this.grid1.hostElement.addEventListener('click', (e) => {
                    const target = e.target;

                    // 🔹 클릭한 요소가 'file-download' 클래스인지 확인
                    if (target.classList.contains('file-download')) {
                        e.preventDefault();

                        const fileName = target.dataset.file;
                        if (!fileName) {
                            Alert.alert('', '파일 정보가 없습니다.');
                            return;
                        }

                        // ✅ 백엔드 매핑: @GetMapping("/downFile")
                        const downloadUrl = `/api/request/downFile?fileName=${encodeURIComponent(fileName)}`;

                        // ✅ 새 창으로 다운로드 (URL 인코딩 주의)
                        window.open(downloadUrl, '_blank');
                    }
                });

                // 그리드 선택 이벤트 - 상세 정보 표시
                this.grid1.selectionChanged.addHandler((s, e) => {
                    const row = s.selection.row;
                    if (row < 0) return;

                    const item = s.rows[row].dataItem;
                    if (!item) return;

                    // ✅ HTML 태그 제거 (웹에디터 내용에서 순수 텍스트만 추출)
                    const plainContent = (item.content || '').replace(/<[^>]+>/g, '');
                    const plainRemark = (item.remark || '').replace(/<[^>]+>/g, '');
                    console.log('remark : ', item.remark)

                    // 요청현황 탭의 상세 정보 영역에 데이터 표시
                    $('#reqtextf').val(plainContent);
                    $('#reqtextf2').val(plainRemark);
                    // 처리내용은 별도 조회 필요
                });

                // 그리드 더블클릭 이벤트 - 상세 조회 및 처리등록
                this.grid1.hostElement.addEventListener('dblclick', (e) => {
                    const view = this.grid1;
                    const selected = view.selectedItems;

                    if (!selected || selected.length !== 1) {
                        Alert.alert('', '선택된 데이터가 없습니다.');
                        return;
                    }

                    const item = selected[0];
                    this.loadRequestDetail(item);
                });


                //처리등록 클릭
                this.$btnAddNew.click(function (e) {
                    const selected = _this.grid1.selectedItems;
                    if (!selected || selected.length !== 1) {
                        Alert.alert('', '처리할 요청사항을 선택하세요.');
                        return;
                    }
                    const item = selected[0];
                    _this.loadRequestDetail(item);
                });



            }


            searchMain(){
                let _this = this;

                let data = {
                    searchfrdate: $('#searchfrdate2').val(),
                    searchtodate: $('#searchtodate2').val(),
                    searchCompCd: $('#cboCompanyHidden2').val(),
                    searchCompnm: $('#cboCompany2').val(),
                    aspernm: $('#aspernm2').val(),
                    reqType : $('#reqType2').val(),
                    recyn : $('#recyn').val(),
                    spjangcd: getSpjangcdFromSession(),
                }

                let url = _this.url + '/search';
                let fnsuccess = function (result) {
                    if (result != null && result.data) {
                        _this.viewData.sourceCollection = result.data;
                    } else {
                        _this.viewData.sourceCollection = [];
                    }
                };
                AjaxUtil.getAsyncData(url, data, fnsuccess);
            }

            loadRequestDetail(item) {
                let _this = this;
                
                if (!item || !item.id) {
                    return;
                }

                let params = {
                    asid: item.id,
                    action: 'detail'
                };

                AjaxUtil.getAsyncData(_this.url + '/detail', params, function(result) {
                    if (result && result.data) {
                        const data = result.data;
                        _this.showPlanForm(data);
                    }
                });
            }


            //처리등록 팝업활성화
            showPlanForm(data) {

                let _this = this;
                let formData = data; // 클로저를 위한 변수명 변경
                let content = tmpl('planTemplate', formData);
                let $content = $(content);

                // 팝업 열기
                let modalContainer = new PopupDraggable('처리등록');
                modalContainer.open({ width: 1150, height: 725, $content });

                // ✅ 팝업 렌더링 후 Editor 생성 (외부 스코프에서 선언)
                let popupEditor = null;
                setTimeout(() => {
                    const webEditEl = $content.find('#webEdit')[0];
                    if (webEditEl) {
                        popupEditor = new toastui.Editor({
                            el: webEditEl,
                            height: '280px',
                            initialEditType: 'wysiwyg',
                            previewStyle: 'vertical',
                            placeholder: '처리 내용을 입력하세요...',
                            toolbarItems: [
                                ['heading', 'bold', 'italic', 'strike'],
                                ['hr', 'quote'],
                                ['ul', 'ol', 'task', 'indent', 'outdent'],
                                ['table', 'link'],
                                ['code', 'codeblock']
                            ]
                        });
                        
                        // 기존 처리내용이 있으면 설정
                        if (formData.processContent) {
                            popupEditor.setHTML(formData.processContent);
                        }
                    }
                }, 200);

                let $btnDelete = $content.find('#btnDelete');
                let $planForm = $content.find('#planForm');
                // 저장버튼
                let $btnPopSave = $content.find('#btnSave');

                // 처리일자 설정 (오늘 날짜)
                let initDateStr = new Date().toISOString().slice(0, 10);
                $content.find('#rptdate').val(initDateStr);

                // 본사담당 설정
                const username = sessionStorage.getItem("username");
                if (username) {
                    $content.find('#aspernm').val(username);
                }

                // 기존 데이터 바인딩
                if (formData.id) {
                    $content.find('#id').val(formData.id);
                    $content.find('#cltnm').val(formData.title || formData.retitle || '');
                    // 요청구분, 화면명 등은 readonly로 표시만
                    $content.find('#asmenu').val(formData.asmenu || '');
                    // ✅ HTML 태그 제거 (웹에디터 내용에서 순수 텍스트만 추출)
                    const plainContent = (formData.content || '').replace(/<[^>]+>/g, '');

                    // 요청현황 정보 영역에 데이터 표시
                    $('#reqtextpop').val(plainContent);
                }

                // ✅ 완료 첨부파일 존재 시 표시
                if (formData.fix_file && formData.fix_file.trim() !== '') {
                    // 파일 존재할 때
                    $content.find('#fileText')
                        .val('완료첨부 파일존재')
                        .css({
                            'color': '#0a7cff',     // 파란색 강조
                            'font-weight': 'bold'   // 굵게
                        })
                        .data('filename', formData.fix_file); // ✅ 나중에 다운로드용으로 파일명도 저장
                } else {
                    // 파일 없을 때 (초기화)
                    $content.find('#fileText')
                        .val('')
                        .css({ 'color': '', 'font-weight': '' })
                        .removeData('filename');
                }

                // 진행구분 셀렉트 박스 초기화
                AjaxUtil.fillSelectOptions($content.find('#actflag'), 'system_code', '', '1', 'recyn');
                if (formData.recyn) {
                    $content.find('#actflag').val(formData.recyn);
                }

                // 요청구분 셀렉트 박스 바인드
                AjaxUtil.fillSelectOptions($content.find('#fixflag'), 'system_code', '', formData.reqtype, 'asdv');
                if (formData.reqtype) {
                    $content.find('#fixflag').val(formData.reqtype);
                }

                // 처리등록 팝업 저장버튼 클릭
                $btnPopSave.off('click').on('click', function (e) {
                    e.preventDefault();
                    
                    // 필수 필드 검증
                    const asid = $content.find('#id').val();
                    if (!asid) {
                        Alert.alert('', '요청사항을 선택하세요.');
                        return;
                    }

                    const fixdate = $content.find('#rptdate').val();
                    if (!fixdate) {
                        Alert.alert('', '처리일자를 입력하세요.');
                        return;
                    }

                    Alert.confirm('', '저장하시겠습니까?', function () {
                        // Toast UI Editor에서 처리내용 가져오기
                        let processContent = '';
                        if (popupEditor) {
                            try {
                                processContent = popupEditor.getHTML();
                            } catch (e) {
                                console.error('Editor getHTML error:', e);
                            }
                        }
                        
                        // 진행구분
                        const recyn = $content.find('#actflag').val() || '1';
                        const check020 = $content.find('#check020').is(':checked') ? "1" : "0";

                        const payload = {
                            fixid: formData.fixid || '',
                            asid: asid,
                            fixdate: fixdate,
                            rptdate: fixdate, // 호환성
                            remark: processContent,
                            processContent: processContent,
                            recyn: recyn,
                            check020: check020,
                            spjangcd: getSpjangcdFromSession(),
                        };

                        console.log('Save payload:', payload);

                        // ✅ 파일 첨부 처리
                        const fileInput = $content.find('#drawingFile')[0];
                        const file = fileInput && fileInput.files.length > 0 ? fileInput.files[0] : null;

                        if (file) {
                            let formData = new FormData();
                            formData.append('uploadFile', file);

                            AjaxUtil.postFileAsyncData(
                                '/api/request/uploadFile',
                                formData,
                                function (res) {
                                    if (res.success) {
                                        console.log('파일 업로드 성공:', res.data);
                                        payload.as_file = res.data;
                                        saveProcessData(payload);
                                    } else {
                                        Alert.alert('', '파일 업로드 실패: ' + res.message);
                                    }
                                },
                                function (req, status, error) {
                                    console.error('파일 업로드 실패:', req.responseText);
                                    Alert.alert('오류', '파일 업로드 중 오류가 발생했습니다 (' + req.status + ')');
                                }
                            );
                        } else {
                            saveProcessData(payload);
                        }

                        // ✅ 파일 업로드 후 호출되는 저장 함수
                        function saveProcessData(data) {
                            AjaxUtil.postJsonData(_this.url + '/save', data, function (res) {
                                if (res.success) {
                                    Notify.success("저장되었습니다.");
                                    _this.searchMain();
                                    modalContainer.close();
                                } else {
                                    Alert.alert('저장 실패', res.message || '알 수 없는 오류');
                                }
                            });
                        }
                    });
                });

                // 삭제 버튼
                $btnDelete.click(function (e) {
                    let data = FormUtil.extractForm($planForm);

                    Alert.confirm('', '전체 삭제하시겠습니까?',
                        function () {
                            let id = data.head_id;
                            _this.deletePlanData(id);
                        },
                        function () {
                        }
                    );
                    modalContainer.close();

                });

            }
            showGetComp() {
                let _this = this;
                let viewdata4;
                let theGrid4;
                let selectedItem = null;

                let content = tmpl('getCompTemplate', {});
                let $content = $(content);

                let popContainer = new PopupDraggable('거래처조회');
                popContainer.open({ width: 800, height: 500, $content });

                let $searchName = $content.find('#searchName');
                let $searchCode = $content.find('#searchCode');
                let $btnSearch = $content.find('#btnSubjectSearch');


                // 사번 조회 함수
                function fetchPersonList() {
                    let searchCode = $searchCode.val();
                    let searchName = $searchName.val();

                    $.ajax({
                        url: '/api/request/getComp',
                        type: 'GET',
                        data: {
                            searchCode: searchCode,
                            searchName: searchName,
                            spjangcd: sessionStorage.getItem('spjangcd')
                        },
                        async: false,
                        success: function (res) {
                            let data2 = res.data || [];

                            viewdata4 = new wijmo.collections.CollectionView(data2);

                            if (theGrid4) {
                                theGrid4.itemsSource = viewdata4;
                            }
                        },
                        error: function (jqXHR, textStatus, errorThrown) {
                            console.error('Error fetching person data:', textStatus, errorThrown);
                        }
                    });
                }

                // 그리드 먼저 생성
                theGrid4 = new wijmo.grid.FlexGrid('#comp-grid', {
                    autoGenerateColumns: false,
                    showMarquee: true,
                    columns: [
                        { binding: 'Code', header: '업체코드', width: 100, align: 'center' },
                        { binding: 'BusinessNumber', header: '사업자번호', width: 150, align: 'center' },
                        { binding: 'Name', header: '거래처명', width: '*', align: 'center' },
                        { binding: 'OurManager', header: '담당자명', width: 150, align: 'center' },
                    ],
                    isReadOnly: true,
                    itemsSource: null
                });

                theGrid4.rowHeaders.columns.splice(0, 1);


                fetchPersonList();


                $btnSearch.click(() => {
                    fetchPersonList();
                });


                $searchCode.add($searchName).on('keydown', function (e) {
                    if (e.keyCode === 13) {
                        fetchPersonList();
                    }
                });

                theGrid4.selectionChanged.addHandler((s, e) => {
                    selectedItem = s.collectionView.currentItem;
                });

                $content.find('#btnAccountSave').click(() => {
                    if (selectedItem) {
                        console.log('selectedItem : ', selectedItem)
                        $('#cboCompany2').val(selectedItem.Name);
                        $('#cboCompanyHidden2').val(selectedItem.Code);
                        popContainer.close();
                    }/* else {
                        Alert.alert('', '사번을 선택해주세요.');
                    }*/
                });

                theGrid4.hostElement.addEventListener('dblclick', function (e) {
                    let items = theGrid4.selectedItems;
                    if (items.length === 0) {
                        return false;
                    }
                    const selectedItem = items[0];
                    if (selectedItem) {
                        console.log('selectedItem : ', selectedItem)
                        $('#cboCompany2').val(selectedItem.Name);
                        $('#cboCompanyHidden2').val(selectedItem.Code);
                        popContainer.close();
                    }
                    popContainer.close();
                });

            }
        }

        let page = null;


        $(document).ready(function (e) {
            page = new SalesList();
            // ✅ 세션 스토리지에서 로그인 정보 불러오기
            // const userId = sessionStorage.getItem('userid');     // 사업자번호
            // const userName = sessionStorage.getItem('username'); // 업체명
            //
            // // ✅ 값 존재 시 자동 바인딩
            // if (userId) {
            //     $('#cboCompanyHidden2').val(userId);  // 거래처 코드(사업자번호)
            // }
            // if (userName) {
            //     $('#cboCompany2').val(userName);      // 업체명
            // }

            // 조회 버튼
            $('#btnSearch2').click(function(){
                page.searchMain();
            });

            // 파일선택 버튼 클릭 시, 파일 선택창 실행

                $('#drawingFile').click(); // ✅ 이 한 줄이 핵심
            });

            // 업체명 input 클릭시 업체 검색 팝업 활성화
            $('#cboCompany2').click(function (e) {
                page.showGetComp();
            });

            // 본사담당 설정
            const username = sessionStorage.getItem("username");
            if (username) {
                $('#aspernm2').val(username);

            }

            page.searchMain();


        })

        // 완료 파일 선택 완료후 화면에 표시
        $('#drawingFile').on('change', function() {
            const file = this.files[0];
            // 파일이 선택되지 않은 경우
            if (!file) return;

            // 파일 확장자 검사
            const fileName = file.name.toLowerCase();

            // 경고 메시지 표시

            // 파일 선택 초기화 (바인딩 해제)

            Alert.alert('', '선택된 파일: ' + file.name);
            document.getElementById('fileText').value = file.name;
        });

        // 접수처리 클릭 이벤트
        $('#btnReceipt').on('click', function () {
            const grid = wijmo.Control.getControl('#theGrid_reqList');
            const selectedItem = grid.selectedItems[0];

            // 선택 확인
            if (!selectedItem) {
                Alert.alert('', '행을 선택해주세요.');
                return;
            }

            const asid = selectedItem.id;

            Alert.confirm('', '선택한 요청을 접수하시겠습니까?', function () {
                const payload = { asid: asid };

                // ✅ CSRF 자동 처리되는 AjaxUtil 사용
                AjaxUtil.postJsonData(page.url + '/receive', payload, function (res) {
                    if (res.success) {
                        Alert.alert('', '접수가 완료되었습니다.');
                        page.searchMain(); // ✅ 그리드 갱신
                    } else {
                        Alert.alert('', '실패: ' + (res.message || '알 수 없는 오류'));
                    }
                });
            });
        });

        // 완료첨부 다운로드 버튼
        $(document).on('click', '#download', function () {
            const grid = wijmo.Control.getControl('#theGrid_reqList');
            const selectedItem = grid.selectedItems[0];

            if (!selectedItem) {
                Alert.alert('', '다운로드할 행을 선택하세요.');
                return;
            }

            const fileName = selectedItem.fix_file; // ✅ 조회 결과에서 직접 가져옴

            if (!fileName || fileName.trim() === '') {
                Alert.alert('', '완료 첨부 파일이 없습니다.');
                return;
            }

            window.open('/api/request_current/downFile?fileName=' + encodeURIComponent(fileName), '_blank');
        });



        $(document).on('change', '#drawingFile', function() {
            const file = this.files[0];
            if (!file) return;
            $('#fileText').val(file.name);
        });

    </script>
