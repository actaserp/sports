<html layout:decorate="~{layout_page}">

<head>
    <style>

        [data-ax5grid] [data-ax5grid-container="root"] [data-ax5grid-container="body"] [data-ax5grid-panel] table tr td [data-ax5grid-cellHolder] {
            font-size: 14px;
        }

/* 상단 요약 카드 컨테이너 */
.settlement-summary-container {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

/* 왼쪽 파란색 카드 */
.summary-card-blue {
    flex: 1;
    background: #00A1FF;
    color: white;
    border-radius: 15px;
    padding: 40px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.summary-card-blue h3 {
    font-size: 18px;
    font-weight: 500;
    margin: 0;
}

.summary-card-blue .amount-wrap {
    text-align: center;
    margin-top: 20px;
}

.summary-card-blue .amount-wrap .month-label {
    font-size: 16px;
    opacity: 0.9;
}

.summary-card-blue .amount-wrap .main-amount {
    font-size: 48px;
    font-weight: 700;
    margin: 10px 0;
}

.summary-card-blue .amount-wrap .unit {
    font-size: 20px;
}

/* 카드 배경 원형 데코레이션 */
.summary-card-blue::after {
    content: '';
    position: absolute;
    right: -20px;
    top: -20px;
    width: 150px;
    height: 150px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
}

/* 오른쪽 화이트 상세 카드 */
.summary-card-white {
    flex: 1.5;
    background: white;
    border-radius: 15px;
    border: 1px solid #EAEAEA;
    padding: 30px;
}

.summary-table {
    width: 100%;
    border-collapse: collapse;
}

.summary-table thead {
    border-bottom: 1px solid #F0F0F0;
}

.summary-table th {
    color: #999;
    font-size: 14px;
    text-align: left;
    padding-bottom: 15px;
}

.summary-table td {
    padding: 12px 0;
    font-size: 16px;
}

.summary-table .text-right {
    text-align: right;
}

.summary-table .total-row {
    border-top: 1px solid #F0F0F0;
    color: #00A1FF;
}

.summary-table .total-row td {
    padding-top: 20px;
    font-weight: bold;
}

.summary-table .total-amount {
    font-size: 20px;
}

/* 하단 상세 내역 섹션 */
.detail-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 15px;
}

.detail-header h3 {
    font-size: 18px;
    font-weight: bold;
    margin: 0;
}

.detail-header .unit-info {
    color: #999;
    font-size: 12px;
}



/* 추가 사용량 등 강조 스타일 */
.text-danger {
    color: #FF0000 !important;
}

.text-info {
    color: #00A1FF !important;
}

/* 그리드 컨테이너 스타일 수정 */
.detail-section {
    width: 100%;
    overflow-x: auto; /* 내용이 넘치면 가로 스크롤 생성 */
}

#settlement-detail-grid {
    height: 280px;
    border-top: 2px solid #333;
    min-width: 1200px; /* 모든 컬럼이 여유 있게 보일 최소 가로 너비 강제 */
}
    </style>
</head>
<th:block layout:fragment="content">
    <div class="layout-contents">
        <div class="page-title-wrap">
            <div class="left">
                <h2>실시간 사용량 및 정산 내역</h2>
                <a title="북마크" class="bookmark toggle">
                    내 메뉴
                </a>
            </div>
            <ul class="page-navi">
                <li><img th:src="@{/images/icon/ico-nav-home.svg}" alt="홈아이콘"></li>
                <li>설정</li>
                <li>실시간사용량</li>
            </ul>
        </div>
        <div class="tab-wrap" style="height: 100%;">
            <div class="tab-contents" style="height: 100%;">
                <!-- Section -->
                <div class="row" style="margin-bottom: 0; height: 97%;">
                    <section class="wp100" style="margin-right: 10px; border-radius:15px; display: flex; flex-direction: column; height: 100%;">
                        <div class="settlement-summary-container">
                            <div class="summary-card-blue">
                                <h3>결제 예정 금액</h3>
                                <div class="amount-wrap">
                                    <p class="month-label">월 예정금액</p>
                                    <h1 class="main-amount" id="realTimeBill">- <span class="unit">원/월</span></h1>
                                </div>
                            </div>

                            <div class="summary-card-white">
                                <table class="summary-table">
                                    <thead>
                                    <tr>
                                        <th class="text-center">요금 구분</th>
                                        <th class="text-center">금액</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr>
                                        <td>총 서비스 요금</td>
                                        <td class="text-right" style="font-weight: 600;" id="service_amt">- 원/월</td>
                                    </tr>
                                    <tr>
                                        <td>초과분(api 호출)</td>
                                        <td class="text-right" style="font-weight: 600;" id="over_cnt">- 회/월</td>
                                    </tr>
                                    <tr>
                                        <td>초과금액</td>
                                        <td class="text-right" style="font-weight: 600;" id="over_amt">- 원/월</td>
                                    </tr>
                                    <tr class="total-row">
                                        <td>합계 (VAT 포함)</td>
                                        <td class="text-right total-amount" id="total_amt">- 원/월</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="detail-section">
                            <div class="detail-header">
                                <h3>요금 상세 내역</h3>
                                <span class="unit-info">(VAT별도, 원단위 기준)</span>
                            </div>
                            <div id="settlement-detail-grid"></div>
                        </div>
                    </section>
                </div>
            </div>
        </div>

    </div>
</th:block>
<th:block layout:fragment="scripts">
    <script th:src="@{/resource/apexcharts/apexcharts.3.26.min.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript">
        class AmountUse {
            constructor() {

                this.url = '/api/realtime';
                this.viewData = new wijmo.collections.CollectionView(); 
                this.grid = null;
                this.init();
                //this.setData();
            }

            

            init() {
                let _this = this;
            
                this.grid = new wijmo.grid.FlexGrid('#settlement-detail-grid', {
                autoGenerateColumns: false,
                headersVisibility: wijmo.grid.HeadersVisibility.Column,
                selectionMode: wijmo.grid.SelectionMode.None,
                isReadOnly: true,
                allowSorting: false,
                itemsSource: this.viewData, // 데이터 바인딩
                columns: [
                    { header: '사용기간', binding: 'stat_day', width: 180, align: 'center' },
                    { header: '서비스명', binding: 'name', width: 150 },
                    { header: '기본요금', binding: 'price', width: 120, align: 'right', format: 'n0' },
                    { header: '기본제공(api호출)', binding: 'api_call_limit', width: '*', align: 'center' },
                    { header: '초과분(api호출)', binding: 'over_api_cnt', width: '*', align: 'center' },
                    { header: '사용량', binding: 'totalRealTimeCnt', width: 120, align: 'center' },
                    { header: '비고', binding: 'remark', width: '*', align: 'left' },
                    { header: '청구금액', binding: 'bill', width: 150, align: 'right', format: 'n0' }
                ],
                formatItem: (s, e) => {
                    if (e.panel === s.cells) {
                        let item = s.rows[e.row].dataItem;

                        // 1. "초과사용량" 등 붉은색 강조 (이미지의 빨간색 박스 부분)
                        if (item.is_excess) {
                            e.cell.style.color = '#FF0000';
                        }
                    }

                    // 헤더 스타일링
                    if (e.panel === s.columnHeaders) {
                        e.cell.style.background = '#F9FAFB';
                        e.cell.style.fontWeight = 'bold';
                    }
                }
            });
        }

            searchMainData(){
                let _this = this;
                let data = {

                }

                let result = AjaxUtil.getSyncData(this.url + "/read", data);

                if(result.success){
                    console.log('result', result.data);

                    const data = result.data[0];

                    this.renderBillingInfo(data);

                    _this.viewData.sourceCollection = result.data;
                }
            }

            renderBillingInfo(data) {
                // 숫자에 콤마를 찍어주는 내부 유틸리티 함수
                const formatComma = (val) => {
                    if (!val) return "0";
                    const num = parseFloat(String(val).replace(/[^0-9.-]/g, ""));
                    return isNaN(num) ? "0" : num.toLocaleString();
                };

                // 1. 메인 대시보드 예정 금액 (기존 로직 유지)
                $('#realTimeBill').html(data.bill + ' <span class="unit">원/월</span>');

                // 2. 총 서비스 요금 (기본료)
                $('#service_amt').text(formatComma(data.price) + "원");

                // 3. 초과분 호출 수
                $('#over_cnt').text(formatComma(data.over_api_cnt) + "회");

                // 4. 초과 금액
                $('#over_amt').text(formatComma(data.over_api_amt) + "원");

                // 5. 합계 (서버에서 받은 bill 그대로 표시)
                $('#total_amt').text(data.bill);
            }

            setData() {
            // 실무에서는 AjaxUtil.getSyncData('/api/dashboard/custom_order') 등을 사용하겠지만,
            // 여기서는 화면 확인을 위한 Mock 데이터를 직접 구성합니다.
            const mockData = [
                {
                    service_name: 'Standard', unit_price: 300000, base_qty: '5GB/1000건', extra_qty: '',
                    cur_usage: '1.5GB/200건 (잔여 3.5GB/800건)', remark: '서비스 월 요금', period: '2026-01-01 ~ 2026-02-05',
                    amount: 240000
                },

                {
                    service_name: 'Premium', unit_price: 3000000, base_qty: '50GB/10000건', extra_qty: '',
                    cur_usage: '15GB/2600건 (잔여 35GB/7300건)', remark: '서비스 옵션 월 요금', period: '2026-01-02 ~ 2026-02-05',
                    amount: 0
                }
            ];

            // 그리드에 데이터 바인딩
            this.settlementGrid.itemsSource = mockData;


            }
        }

        let page = null;

        $(document).ready(function (e) {

            //현재 월 업데이트 
            updateCurrentMonth();

            page = new AmountUse();

            page.searchMainData();


            function updateCurrentMonth() {
                // 현재 날짜 기준 월 계산 (1~12)
                const currentMonth = new Date().getMonth() + 1;
                
                // 대상 요소 선택
                const $monthLabel = $('.month-label');
                
                if ($monthLabel.length > 0) {
                    // 텍스트 변경
                    $monthLabel.text(currentMonth + '월 예정금액');
                }
            }
            
            
        });
    </script>
</th:block>
</html>
