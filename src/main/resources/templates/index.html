    <style>
        .left {
            cursor: pointer;
        }

        .menu_area {
            transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
            transform: translateX(0); /* 기본 위치 */
            opacity: 1;
            width: 250px; /* 메뉴 너비 */
            position: absolute; /* 왼쪽 고정 */
            left: 0;
            visibility: visible;
            pointer-events: auto;
        }

        /* 메뉴가 사라질 때 */
        .menu_area.hidden {
            transform: translateX(-250px); /* 부드럽게 왼쪽으로 사라짐 */
            opacity: 0;
            visibility: hidden;
            pointer-events: none; /* 클릭 방지 */
        }

        /* 컨텐츠 영역 */
        .con_area {
            transition: width 0.3s ease-in-out, left 0.3s ease-in-out;
            width: calc(100% - 250px); /* 기본적으로 메뉴 너비만큼 줄어든 상태 */
            left: 250px; /* 메뉴가 있을 때 기본 위치 */
        }

        /* 메뉴가 사라지면 컨텐츠 영역 확장 */
        .menu_area.hidden + .con_area {
            width: 100%;
            left: 0;
        }

        /* 부드럽게 나오는 애니메이션 */
        @keyframes menuFadeIn {
            0% {
                transform: translateX(-250px);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }
        /* help 버튼 */
        a.help {
            background-color: #0056b3;
            color: #fff;
            border-radius: 5px;
            padding: 5px 10px;
            font-size: 13px;
            text-decoration: none;
            transition: 0.2s;
        }
        a.help:hover {
            background-color: #0066cc;
        }

        /* 유지보수 토글 css */
        header .right .user-box2 {
            display: none;
            position: absolute;
            top: 60px;
            right: 240px;
        }

        header .right .user-box2 ul {
            display: flex;
            justify-content: center;
            flex-flow: column wrap;
            background-color: #fff;
            border: 1px solid #E6E6E6;
            border-radius: 3px;
            box-shadow: 0px 0px 10px rgba(0, 2, 6, 0.08);
            padding: 8px;
        }

        header .right .user-box2 a {
            display: block;
            min-width: 120px;
            padding: 9px 16px;
            font-size: 14px;
            color: #4D4D4D;
            text-align: center;
        }

        header .right .user-box2 a:hover {
            background-color: #EDEFF5;
            border-radius: 3px;
            color: #333333;
            font-weight: 700;
        }

        /* 알림 영역 */
        header .right .alarm-box {
            max-height: 300px;
            display: none;
            flex-direction: column;
        }

        header .right .alarm-box.open {
            display: flex;
        }

        header .right .alarm-box .alarm-tab-item {
            display: none;
            flex: 1;
            overflow-y: auto;
        }


        header .right .alarm-box .alarm-tab-item.active {
            display: block;
        }

        /* 테이블 제거 느낌 */
        .alarm-table {
            width: 100%;
            table-layout: fixed;
            border-collapse: separate;
            border-spacing: 0 2px;
        }

        .alarm-table tr {
            background: #f9fafb;
            border-radius: 10px;
            transition: background .2s ease, transform .1s ease;
        }

        .alarm-table tr:hover {
            background: #eef4ff;
            transform: translateY(-1px);
        }


        /* 셀 정리 */
        .alarm-table td {
            padding: 10px 6px;
            border: none;
        }

        /* 타입 */
        .notif-type {
            width: 70px;
            text-align: center;
        }

        /* ===== 공통 배지 ===== */
        .notif-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;

            min-width: 46px;
            height: 22px;
            padding: 0 8px;

            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;

            box-sizing: border-box;
            user-select: none;
        }

        /* ===== 타입별 배지 ===== */

        /* 🔔 알림 */
        .notif-badge.is-alarm {
            background-color: #3069B3;
        }

        /* ✉️ 메시지 */
        .notif-badge.is-message {
            background-color: #5A8DEE;
        }

        /* 💬 답장 */
        .notif-badge.is-reply {
            background-color: #2EC9D6;
        }

        .notif-msg {
            padding: 6px 4px;
            line-height: 1.4;
            word-break: break-word;
            text-align: left;
        }

        .notif-time {
            width: 110px;
            text-align: center;
            color: #666;
            font-size: 11px;
        }

        .notif-date {
            font-weight: 600;
        }

        .notif-clock {
            font-size: 10px;
            opacity: 0.85;
        }

        .alarm-table tr.unread {
            background: #e8f1ff;
        }

        .alarm-table tr.unread .alarm-msg {
            font-weight: 600;
        }

        .alarm-actions {
            display: flex;
            gap: 6px;
        }

        .alarm-actions .btn-gray {
            flex: 1;
            padding: 6px 0;                /* 🔥 높이 줄이기 */
            font-size: 12px;               /* 🔥 살짝 작게 */
            font-weight: 600;
            text-align: center;

            background: #f5f6f8;           /* 연한 배경 */
            color: #555;

            border: 1px solid #e0e3e8;     /* 얇은 테두리 */
            border-radius: 14px;           /* 🔥 둥글게 */

            cursor: pointer;
            transition: all .15s ease;
        }

        .alarm-actions .btn-gray:hover {
            background: #eaf1ff;
            border-color: #3069B3;
            color: #3069B3;
        }

        .alarm-actions .btn-gray:active {
            transform: scale(0.97);
        }



    </style>
</head>

<script type="text/javascript">
    let nthTabs = null;
    let default_menu = null;
    let menuName_list = [];
    let menu_arr = [];
    let cachedMenus = null;

    $(document).ready(function () {

        function loadMenusOnce(callback) {
            if (cachedMenus) {
                callback(cachedMenus);
                return;
            }

            $.getJSON(withCtx('/api/system/menus'), function (response) {
                cachedMenus = response.data;
                callback(cachedMenus);
            });
        }

        $(".left").click(function () {
            nthTabs.delAllTab();
            // window.location.reload();
        });

        // let lang_cd = i18n.getLanguageCode();
        //i18n.initializeCommonData(lang_cd);
        // i18n.initializeMenuData(lang_cd);

        // 메뉴 매핑(FrontFolder_id)

        nthTabs = $('#main-tabs').nthTabs();

        function renderMenuByFrontFolder(menus, FrontFolderId, $FrontFolderElement) {

            // 메뉴리스트 초기화 (⚠️ 전체 기준, 1회만)
            menuName_list = menus.flatMap(folder =>
                (folder.nodes || []).map(node => node.objNm)
            ).filter(Boolean);

            menu_arr = menus.flatMap(folder =>
                (folder.nodes || []).map(node => ({ [node.objNm]: node.objUrl }))
            );

            // FrontFolder_id 기준 필터링
            const folders = menus.filter(folder =>
                folder.frontfolder_id === parseInt(FrontFolderId)
            );

            if (folders.length === 0) return;

            // 해당 FrontFolderId 메뉴 표시
            $FrontFolderElement.closest('.dep1-1').css('display', 'block');

            folders.forEach(function (folder) {

                let $li = $('<li class="dep2-1"></li>');
                let $a = $('<a href="#"></a>').text(folder.folder_name);
                $li.append($a);

                let $subUl = $('<ul class="dep3 documents" style="display: none;"></ul>');
                $li.append($subUl);

                folder.nodes.forEach(function (item) {
                    let $itemLi = $('<li class="dep3-custom-list-style" style="cursor: default; list-style-image: none;"></li>');
                    let $itemA = $('<a href="#" ' +
                        'menuurl="' + item.objUrl + '" ' +
                        'data-bookmark="' + item.isbookmark + '" ' +
                        'data-objid="' + item.objId + '" ' +
                        'title="' + item.objNm + '">' +
                        item.objNm +
                        '</a>');

                    $itemLi.append($itemA);
                    $subUl.append($itemLi);
                });

                $FrontFolderElement.append($li);

                // dep2(중메뉴) 클릭 이벤트
                $a.on('click', function (e) {
                    e.preventDefault();
                    e.stopPropagation();

                    const isActive = $li.hasClass('active');

                    if (isActive) {
                        // 닫기: 클래스 먼저 제거하고 스르륵 접기
                        $li.removeClass('active');
                        $subUl.slideUp(300);
                    } else {
                        // 열기: 다른 중메뉴들 닫기
                        $li.siblings().removeClass('active').find('.dep3').slideUp(300);
                        
                        // 스르륵 펼치기
                        $subUl.slideDown(300, function() {
                            $li.addClass('active');
                        });
                    }
                });
            });

            // dep3 클릭 이벤트 (이벤트 위임)
            $FrontFolderElement.find('.dep3').off('click').on('click', 'a', function (e) {
                e.preventDefault();

                $FrontFolderElement.find('.dep3 li').removeClass('on');
                $(this).closest('li').addClass('on');

                let objid = $(this).data('objid');
                let title = $(this).text();
                let bookmark = $(this).data('bookmark');

                if (nthTabs.isExistsTab('#' + objid)) {
                    nthTabs.toggleTab('#' + objid);
                } else {
                    nthTabs.addTab({
                        id: objid,
                        title: title,
                        url: withCtx('/gui/' + objid + '/default'),
                        active: true,
                        allowClose: true,
                        isbookmark: bookmark
                    });
                }
            });
        }

        function initializeMenuSearchData(menus) {
            menuName_list = menus.flatMap(folder =>
                (folder.nodes || []).map(node => node.objNm)
            ).filter(Boolean);

            menu_arr = menus.flatMap(folder =>
                (folder.nodes || []).map(node => ({ [node.objNm]: node.objUrl }))
            );
        }

        loadMenusOnce(function (data) {
            const menus = data.menuItems;
            const frontFolders = data.frontFolders;

            initializeMenuSearchData(menus);

            const $menuContainer = $('.dep1');
            $menuContainer.empty();

            frontFolders.forEach(ff => {
                const ffHtml = `
                    <li class="dep1-1" style="display: none;">
                        <a href="#a" title="${ff.folder_name}" class="${ff.icon_css}">
                            ${ff.folder_name}
                        </a>
                        <ul class="dep2" id="dep2-${ff.dom_id}">
                        </ul>
                    </li>
                `;
                const $ffLi = $(ffHtml);
                $menuContainer.append($ffLi);

                renderMenuByFrontFolder(
                    menus,
                    ff.id,
                    $ffLi.find('.dep2')
                );
            });

            // 동적 생성된 대분류 클릭 이벤트 추가 (이벤트 위임)
            $menuContainer.off('click', '.dep1-1 > a').on('click', '.dep1-1 > a', function (e) {
                e.preventDefault();
                const $parent = $(this).parent();
                const $subMenu = $(this).next('.dep2');
                const isActive = $parent.hasClass('active');

                if (isActive) {
                    $parent.removeClass('active');
                    $subMenu.find('.dep2-1').removeClass('active');
                    $subMenu.slideUp(300);
                } else {
                    $parent.siblings().removeClass('active').find('.dep2').slideUp(300);
                    
                    $parent.addClass('active');
                    $subMenu.slideDown(300, function() {
                        const $dep2Items = $subMenu.find('.dep2-1');
                        if ($dep2Items.length === 1) {
                            $dep2Items.addClass('active');
                            $dep2Items.find('> ul.dep3').slideDown(300);
                        }
                    });
                }
            });
        });

        $('#navbarBarMenu2 .open_menu').click(function () {
            $(this).toggleClass('menu_open'); // 메뉴 숨김 토글

            $('.menu_area').toggleClass('hidden');
            const isMenuHidden = $('.menu_area').hasClass('hidden');

            $('.con_area, .tab-content').css({
                'width': isMenuHidden ? '100%' : 'calc(100% - 250px)', // 메뉴가 닫히면 전체 확장
                'left': isMenuHidden ? '0' : '250px' // 왼쪽으로 확장
            });
        });

        // 북마크 및 default_menu를 한 번에 처리
        $.getJSON(withCtx('/api/system/bookmark'), function (result) {
            let _data = result.data;
            var litagbook = '';

            // 북마크 메뉴 생성
            for (var i = 0; i < _data.length; i++) {

    $('#btnMaintenance').on('click', function (e) {
        e.preventDefault();

        // ✅ 팝업 창 크기 및 위치 설정
        const width = 1400;
        const height = 1000;
        const left = (window.screen.width / 2) - (width / 2);
        const top = (window.screen.height / 2) - (height / 2);

        const url = 'http://actascld.co.kr:8030/gui/wm_request/default?hideBookmark=true&wintitle=%EC%9C%A0%EC%A7%80%EB%B3%B4%EC%88%98%20%EC%9A%94%EC%B2%AD';

        function isSkipped(id)     { return localStorage.getItem(getSkippedKey(id)) === '1'; }
        function markSkipped(id)   { localStorage.setItem(getSkippedKey(id), '1'); }
        function formatDate(d) {
            if (!d || d.length < 8) return d || '';
            return d.substring(0,4) + '-' + d.substring(4,6) + '-' + d.substring(6,8);
        }

            /* 녹색 아이콘 뱃지 (::before 대신 nf-icon 요소 추가 예정) */
            '#nf-popup .nf-icon{width:48px;height:48px;border-radius:50%;',

            'display:flex;align-items:center;justify-content:center;margin-bottom:16px;}',

            /* 메타(종료일) */
            '#nf-popup .nf-meta{font-size:12px;color:#9ca3af;margin-bottom:16px;',
            'padding:0;background:none;border:none;}',

            /* 본문 */
            '#nf-popup .nf-body{padding:0;overflow-y:auto;max-height:200px;',
            'font-size:14px;line-height:1.7;color:#111;margin-bottom:6px;}',

            /* 첨부파일 */
            '#nf-popup .nf-files{padding:16px 0 0;border-top:1px solid #e5e7eb;',
            'background:none;margin-bottom:20px;}',
            '#nf-popup .nf-files-title{font-size:13px;font-weight:600;color:#444;margin-bottom:8px;}',
            '#nf-popup .nf-file-item{display:flex;align-items:center;gap:6px;',
            'padding:6px 8px;border-radius:6px;border:1px solid #e5e7eb;',
            'text-decoration:none;color:#7F56D9;font-size:13px;transition:background .12s;}',
            '#nf-popup .nf-file-item:hover{background:#f5f3ff;}',
            '#nf-popup .nf-file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}',
            '#nf-popup .nf-file-size{color:#9ca3af;font-size:11px;flex-shrink:0;}',

            /* 카운터 - 버튼 위에 별도 표시 */
            '#nf-popup .nf-counter{display:block;text-align:center;font-size:12px;color:#9ca3af;margin-bottom:8px;}',

            /* 푸터 (버튼 2개 나란히) */

            '#nf-popup .nf-x{position:absolute;top:16px;right:16px;background:none;border:none;',
            'color:#9ca3af;font-size:18px;cursor:pointer;line-height:1;padding:0;}',
            '#nf-popup .nf-x:hover{color:#555;}',
        ].join('');

        if (!document.getElementById('nf-style')) {
            var s = document.createElement('style');
            s.id = 'nf-style';
            s.textContent = css;
            document.head.appendChild(s);
        }

        /* 드래그 (native) */
        function makeDraggable(popup, handle) {
            var startX, startY, startL, startT, dragging = false;
            handle.addEventListener('mousedown', function (e) {
                if (e.button !== 0) return;

                // 드래그 시작 전 현재 실제 위치를 left/top으로 고정
                var r = popup.getBoundingClientRect();
                popup.style.left      = r.left + 'px';
                popup.style.top       = r.top  + 'px';
                popup.style.transform = 'none';

                dragging = true;
                startX = e.clientX;
                startY = e.clientY;
                startL = r.left;
                startT = r.top;
                e.preventDefault();
            });
            document.addEventListener('mousemove', function (e) {
                if (!dragging) return;
                popup.style.left = (startL + e.clientX - startX) + 'px';
                popup.style.top  = (startT + e.clientY - startY) + 'px';
            });
            document.addEventListener('mouseup', function () { dragging = false; });
        }


        function showNoticePopup(notices, index) {
            if (index >= notices.length) return;
            var n = notices[index];
            var total = notices.length;

            var popup = document.createElement('div'); popup.id = 'nf-popup';

            /* 1. 녹색 체크 아이콘 */
            var icon = document.createElement('div');
            icon.className = 'nf-icon';
            icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#039855" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

            /* 2. X 닫기 버튼 */
            var xBtn = document.createElement('button'); xBtn.className = 'nf-x'; xBtn.textContent = '✕';

            /* 3. 제목 */
            var titleEl = document.createElement('div'); titleEl.className = 'nf-title-text';
            titleEl.textContent = n.title;

            /* 4. 본문 */
            var body = document.createElement('div'); body.className = 'nf-body';
            body.innerHTML = n.content || '';

            /* 5. 메타(종료일) */
            var meta = document.createElement('div'); meta.className = 'nf-meta';
            meta.textContent = '공지 종료일 : ' + formatDate(n.notice_end_date);

            /* 6. 푸터 */
            var foot    = document.createElement('div'); foot.className = 'nf-foot';
            var skipBtn = document.createElement('button'); skipBtn.className = 'nf-skip'; skipBtn.textContent = '더이상 안보기';
            var counter = document.createElement('span'); counter.className = 'nf-counter';
            if (total > 1) counter.textContent = '(' + (index + 1) + ' / ' + total + ')';
            var closeBtn = document.createElement('button'); closeBtn.className = 'nf-close-btn'; closeBtn.textContent = '닫기';
            foot.appendChild(skipBtn); foot.appendChild(closeBtn); // counter 제거

            /* 순서대로 조립 */
            popup.appendChild(xBtn);
            popup.appendChild(icon);
            popup.appendChild(titleEl);
            popup.appendChild(body);
            popup.appendChild(meta);
            popup.appendChild(counter); // ← foot 위에
            popup.appendChild(foot);

            document.body.appendChild(popup);
            makeDraggable(popup, popup); // 팝업 전체를 드래그 핸들로 사용

            function closeAndNext() {
                popup.remove();
                showNoticePopup(notices, index + 1);
            }
            xBtn.addEventListener('click', closeAndNext);
            closeBtn.addEventListener('click', closeAndNext);
            skipBtn.addEventListener('click', function () { markSkipped(n.id); closeAndNext(); });

            /* 첨부파일 조회 후 foot 앞에 삽입 */
            function fmtSize(bytes) {
                if (!bytes) return '';
                if (bytes < 1024) return bytes + 'B';
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + 'KB';
                return (bytes / 1048576).toFixed(1) + 'MB';
            }

            $.getJSON(withCtx('/api/common/attach_file/detailFiles'),
                { TableName: 'NOTICE', DataPk: n.id, attachName: 'basic' },
                function (res) {
                    if (!res || !res.data || !res.data.length) return;
                    var files = res.data;
                    var section = document.createElement('div'); section.className = 'nf-files';
                    var fileTitle = document.createElement('div'); fileTitle.className = 'nf-files-title';
                    fileTitle.textContent = '첨부파일 (' + files.length + ')';
                    section.appendChild(fileTitle);
                    files.forEach(function (f) {
                        var a = document.createElement('a'); a.className = 'nf-file-item';
                        a.href = withCtx('/api/files/download?file_id=' + f.fileId);
                        var name = document.createElement('span'); name.className = 'nf-file-name'; name.textContent = f.fileNm;
                        var size = document.createElement('span'); size.className = 'nf-file-size'; size.textContent = fmtSize(f.fileSize);
                        a.appendChild(name); a.appendChild(size);
                        section.appendChild(a);
                    });
                    popup.insertBefore(section, foot); // ← counter 아닌 foot 앞에
                }
            );
        }

        $.getJSON(withCtx('/api/support/notice/active'), function (res) {
            if (!res || !res.data || !res.data.length) return;
            var pending = res.data.filter(function (n) { return !isSkipped(n.id); });
            if (pending.length > 0) showNoticePopup(pending, 0);
        });

<script type="text/javascript">
    // 날씨 정보
    fetchWeatherData();
    // 30분마다 날씨 정보 자동 갱신
    setInterval(fetchWeatherData, 1800000);

    function getUiType(alarm) {
        if (alarm.action === 'REPLY') return 'reply';
        if (alarm.action === 'SEND')  return 'message';
        return 'alarm';
    }

    function sseConnect() {

        const spjangcd = sessionStorage.getItem("spjangcd");
        const url = withCtx('/sse/subscribe') + '?spjangcd=' + encodeURIComponent(spjangcd);

        const eventSource = new EventSource(url);


        // ✅ 기존 SYSTEM 이벤트 (레거시)
        eventSource.addEventListener("SYSTEM", function (e) {
            if (e.data) {
                Notify.success(e.data);
            }
        });

        // ✅ 신규 알림
        eventSource.addEventListener("NOTIFICATION", function (e) {

            if (!e.data) return;

            const noti = JSON.parse(e.data);

            alarmList.unshift(noti);      // 🔥 데이터만 쌓기
            increaseAlarmCount();         // 🔔 숫자만 증가
            showToast(noti);
        });

        // ✅ 신규 코멘트
        eventSource.addEventListener("COMMENT", function (e) {
            if (!e.data) return;

            const comment = JSON.parse(e.data);

            // 🔥 알림 리스트에 포함
            alarmList.unshift(comment);
            increaseAlarmCount();

            // 🔥 동일 토스트 사용
            showToast(comment);
        });

        // ✅ 연결 확인
        eventSource.addEventListener("CONNECTED", function () {
            console.log("SSE 연결 완료");
        });

        eventSource.onerror = function (err) {
            console.log("SSE 오류 발생, 재연결 시도 중...", err);
            eventSource.close();
            setTimeout(sseConnect, 3000);
        };
    }

    sseConnect();

    // 알림
    function increaseAlarmCount() {
        const countEl = document.getElementById("alarmCount");
        let count = parseInt(countEl.innerText || "0", 10);
        countEl.innerText = count + 1;
    }

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleString();
    }


    $('.alarm').on('click', function (e) {
        e.preventDefault();   // 🔥 href="#" 막기

        const $box = $('.alarm-box');
        const $tab = $box.find('.alarm-tab-item');
        const $overlay = $('#alarmOverlay');

        const isOpen = $tab.hasClass('active');

        if (isOpen) {
            // 🔽 닫기
            $tab.removeClass('active');
            $overlay.hide();
        } else {
            // 🔼 열기
            renderAlarmList();
            $tab.addClass('active');
            $overlay.show();
        }
    });

    $('#alarmOverlay').on('click', function () {
        $('.alarm-tab-item').removeClass('active');
        $(this).hide();
    });

    function renderAlarmList() {

        const tbody = document.getElementById("alarmTbody");
        if (!tbody) return;

        // 초기화
        tbody.innerHTML = "";

        // 🔕 알림 없음
        if (alarmList.length === 0) {
            tbody.innerHTML = `
            <tr>
                <td colspan="3" style="text-align:center; padding:20px; color:#888;">
                    새로운 알림이 없습니다.
                </td>
            </tr>
        `;
            return;
        }

        // 🔔 알림 있음
        alarmList.forEach(alarm => {
            const uiType = getUiType(alarm);
            const tr = document.createElement("tr");

            const { date, time } = formatAlarmDate(alarm.createdAt);

            tr.innerHTML = `
                <td class="notif-type">
                    <span class="notif-badge is-${uiType}">
                        ${uiType === 'alarm' ? '알림'
                            : uiType === 'message' ? '메시지'
                                : '답장'}
                    </span>
                </td>
                <td class="notif-msg">
                    ${alarm.message}
                </td>
                <td class="notif-time">
                    <div class="notif-date">${date}</div>
                    <div class="notif-clock">${time}</div>
                </td>
            `;


            tr.onclick = () => showToast(alarm);
            tbody.appendChild(tr);
        });
    }

    function formatAlarmDate(dateStr) {
        const d = new Date(dateStr);

        const date = d.toISOString().slice(0, 10); // YYYY-MM-DD

        const time = d.toLocaleTimeString('ko-KR', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: true
        });

        return { date, time };
    }


    const toastMap = new Map();

    function showToast(noti) {

        const uiType = getUiType(noti);

        const container = document.getElementById("toastContainer");
        const notiId = noti.notiId;

        // ✅ 이미 떠 있는 토스트라면
        if (toastMap.has(notiId)) {
            const existing = toastMap.get(notiId);

            // 앞으로 가져오기
            existing.toast.style.zIndex = Date.now();

            // 타이머 리셋
            clearTimeout(existing.timer);
            existing.timer = setTimeout(() => {
                existing.toast.remove();
                toastMap.delete(notiId);
            }, 3000);

            return;
        }

        const titleText =
            uiType === 'reply'   ? '💬 답장' :
                uiType === 'message' ? '✉️ 메시지' :
                    '🔔 알림';

        // ✅ 새 토스트 생성
        const toast = document.createElement("div");
        toast.className = "toast" + (uiType === 'reply' ? " is-reply" : "");

        toast.innerHTML = `
            <div class="toast-header">
                <span>
                    ${titleText}
                    · <strong>
                      ${noti.senderUserName
                        ? `${noti.senderUserName} (${noti.senderUserId})`
                        : noti.senderUserId}
                    </strong>
                </span>
                <span class="close-btn">✕</span>
            </div>


        <div class="toast-message">${noti.message}</div>
        <div class="toast-meta">${formatDate(noti.createdAt)}</div>

        <div class="toast-actions">
            <button class="reply-btn">답장</button>
            <button class="confirm-btn">확인</button>
        </div>

        <div class="toast-reply-box">
            <textarea placeholder="답장을 입력하세요"></textarea>
            <div class="toast-actions">
                <button class="send-btn">전송</button>
                <button class="cancel-btn">취소</button>
            </div>
        </div>
    `;

        container.appendChild(toast);

        // ✅ 자동 제거 타이머
        let autoClose = setTimeout(() => {
            toast.remove();
            toastMap.delete(notiId);
        }, 3000);

        // Map에 등록
        toastMap.set(notiId, {
            toast,
            timer: autoClose
        });

        /* 이벤트 */
        toast.querySelector(".reply-btn").onclick = () => {
            clearTimeout(autoClose);
            toast.classList.add("expanded");
        };

        // 답장 취소
        toast.querySelector(".cancel-btn").onclick = () => {
            toast.classList.remove("expanded");
        };

        // 닫기
        toast.querySelector(".close-btn").onclick = () => {
            toast.remove();
            toastMap.delete(notiId);
        };

        // 확인
        toast.querySelector(".confirm-btn").onclick = () => {
            markAsRead(notiId);
            removeAlarmFromList(notiId);
            decreaseAlarmCount();

            toast.remove();
            toastMap.delete(notiId);
        };

        // 답장 전송
        toast.querySelector(".send-btn").onclick = () => {
            const msg = toast.querySelector("textarea").value.trim();
            if (!msg) return;

            sendReply(notiId, msg);
            removeAlarmFromList(notiId);
            decreaseAlarmCount();
            toast.remove();
            toastMap.delete(notiId);
        };
    }

    // 확인
    function markAsRead(notiId) {
        AjaxUtil.postAsyncData(
            "/api/notifications/read",
            { notiId: notiId },
            function () {
                // 성공 시 특별히 할 거 없으면 비워도 됨
            }
        );
    }

    // 전체 확인
    $('#confirmAllAlarms').on('click', function (e) {
        e.preventDefault();

        if (alarmList.length === 0) {
            return;
        }

        AjaxUtil.postAsyncData(
            "/api/notifications/readAll",
            {},   // spjangcd는 AjaxUtil에서 자동 포함
            function (res) {

                if (!res.success) {
                    Notify.error(res.message || "알림 확인 처리 실패");
                    return;
                }

                // 🔥 프론트 상태 정리
                alarmList = [];
                document.getElementById("alarmCount").innerText = "0";

                // 떠 있는 토스트 전부 제거
                toastMap.forEach(v => v.toast.remove());
                toastMap.clear();

                // 알림 리스트 다시 렌더링
                renderAlarmList();
            }
        );
    });

    // 답장
    function sendReply(parentNotiId, message) {
        AjaxUtil.postAsyncData(
            "/api/notifications/reply",
            {
                parentNotiId: parentNotiId,
                message: message
            },
            function () {
                // 필요하면 성공 토스트
                // Notify.success("답장이 전송되었습니다.");
            }
        );
    }

    // 알림 카운트 감소
    function decreaseAlarmCount() {
        const el = document.getElementById("alarmCount");
        let count = parseInt(el.innerText || "0", 10);
        if (count <= 0) return;
        el.innerText = count - 1;
    }

    // 알림 리스트 제거
    function removeAlarmFromList(notiId) {
        alarmList = alarmList.filter(a => a.notiId !== notiId);
    }

    let selectedUserMap = new Map(); // key: string userId
    let currentGroup = null;
    let userListXhr = null;

    function initSendModalEvents() {

        $('#cboUserGroup').on('change', function () {
            const group = $(this).val();
            currentGroup = group;

            if (!group) {
                $('#userList').html('<div class="user-empty">그룹을 선택하세요</div>');
                return;
            }

            loadUsersByGroup(group);
        });

        $('#userSearch').on('input', function () {
            if (!currentGroup) return;
            loadUsersByGroup(currentGroup);
        });
    }

    initSendModalEvents();

    $(document).on('mousedown', '.btn-clear', function (e) {
        e.preventDefault();
        e.stopPropagation();

        const $input = $('#userSearch');

        if (!$input.val()) return;

        $input.val('').focus();

        // 🔥 DOM 반영 이후 실행
        setTimeout(() => {
            $input.trigger('input');
        }, 0);
    });


    function openSendModal() {
        $('#sendModal').css('display', 'flex');
        $('#sendMessage').val('');
        $('#userSearch').val('');

        var myGroupId = sessionStorage.getItem('groupid') || '';

        AjaxUtil.fillSelectOptions($('#cboUserGroup'), 'user_group', myGroupId);

        currentGroup = myGroupId;
        $('#cboUserGroup').val(myGroupId);

        loadUsersByGroup(myGroupId);
    }

    function openHistoryModal() {
        const today = new Date().toISOString().slice(0, 10);

        $('#historyStartDate').val(today);
        $('#historyEndDate').val(today);
        $('#historyModal').css('display', 'flex');
        searchHistory();
    }

    function closeHistoryModal() {
        $('#historyModal').hide();
    }


    function loadUsersByGroup(group) {

        const keyword = $('#userSearch').val();

        // 이전 요청 종료
        if (userListXhr) {
            userListXhr.abort();
        }

        userListXhr = $.ajax({
            url: withCtx('/api/notifications/user_read'),
            type: 'GET',
            data: {
                group,
                keyword,
                spjangcd: sessionStorage.getItem('spjangcd')
            },
            success(res) {
                renderUserList(res.data || []);
            },
            error(xhr) {
                if (xhr.statusText !== 'abort') {
                    $('#userList').html('<div class="user-empty">사용자 조회 실패</div>');
                }
            }
        });
    }


    function renderUserList(users) {

        if (!users.length) {
            $('#userList').html('<div class="user-empty">사용자가 없습니다</div>');
            return;
        }

        const html = users.map(u => {
            const userId = String(u.login_id);
            const checked = selectedUserMap.has(userId) ? 'checked' : '';

            return `
            <div class="user-item">
                <input type="checkbox"
                       class="chk-user"
                       value="${userId}"
                       data-name="${u.first_name}"
                       data-login="${u.login_id}"
                       ${checked}>
                <span>${u.first_name} (${u.login_id})</span>
            </div>
        `;
        }).join('');

        $('#userList').html(html);
    }

    $(document).on('change', '.chk-user', function () {

        const userId = $(this).val(); // string
        const name = $(this).data('name');
        const login = $(this).data('login');

        if (this.checked) {
            selectedUserMap.set(userId, { id: userId, name, login });
        } else {
            selectedUserMap.delete(userId);
        }

        renderSelectedUsers();
    });

    function renderSelectedUsers() {

        const $container = $('#selectedUsers').empty();

        if (selectedUserMap.size === 0) {
            $container.html('<div class="user-empty">선택된 사용자가 없습니다</div>');
            return;
        }

        selectedUserMap.forEach(u => {
            $container.append(`
            <div class="selected-user">
                ${u.name}
                <button style="padding:0; height:20px;" onclick="removeSelectedUser('${u.id}')">✕</button>
            </div>
        `);
        });
    }


    function removeSelectedUser(userId) {
        selectedUserMap.delete(userId);
        $(`.chk-user[value="${userId}"]`).prop('checked', false);
        renderSelectedUsers();
    }

    function closeSendModal() {
        $('#sendModal').hide();

        // 데이터 초기화
        selectedUserMap.clear();

        // UI 초기화
        $('#selectedUsers').empty()
            .html('<div class="user-empty">선택된 사용자가 없습니다</div>');

        $('.chk-user').prop('checked', false);

        // 검색어도 같이 초기화하고 싶으면
        $('#userSearch').val('');
    }

    function sendAlarmMessage() {

        if (selectedUserMap.size === 0) {
            Alert.alert('', '받는 사람을 선택하세요.');
            return;
        }

        const message = $('#sendMessage').val().trim();
        if (!message) {
            Alert.alert('', '메시지를 입력하세요.');
            return;
        }

        const receiverUserIds = Array.from(selectedUserMap.keys()); // login_id 배열

        const payload = {
            receiverUserIds,
            message
        };

        AjaxUtil.postJsonData('/api/notifications/send', payload, function (res) {
            if (res.success) {
                Notify.success('메시지를 전송했습니다.');
                closeSendModal();
            } else {
                Alert.alert('전송 실패', res.message || '알 수 없는 오류');
            }
        });
    }

    function searchHistory() {

        const startDate = $('#historyStartDate').val();
        const endDate = $('#historyEndDate').val();

        if (!startDate || !endDate) {
            Alert.alert('', '기간을 선택하세요.');
            return;
        }

        if (startDate > endDate) {
            Alert.alert('', '시작일은 종료일보다 클 수 없습니다.');
            return;
        }

        const data = {
            startDate: startDate,
            endDate: endDate
        };

        const url = '/api/notifications/history_list';
        const result = AjaxUtil.getSyncData(url, data);

        if (result.success) {
            renderHistoryTable(result.data);
        } else {
            Alert.alert('조회 실패', result.message || '이력 조회 실패');
        }
    }

    function renderHistoryTable(list) {

        const $tbody = $('#historyTbody');
        $tbody.empty();

        if (!list || list.length === 0) {
            $tbody.append(`
            <tr>
                <td colspan="5" class="empty">조회된 이력이 없습니다.</td>
            </tr>
        `);
            return;
        }

        list.forEach(row => {

            const dt = row.created_at
                ? row.created_at.replace(' ', '<br>')
                : '';

            $tbody.append(`
                <tr>
                    <td style="text-align:center; white-space:normal;">
                        ${dt}
                    </td>
                    <td>${row.sender_user_name}(${row.sender_user_id})</td>
                    <td>${row.receiver_user_name}(${row.receiver_user_id})</td>
                    <td title="${row.message}">${row.message}</td>
                    <td>${row.read_yn}</td>
                </tr>
            `);
        });
    }


    // 날씨 정보를 서버에서 가져오는 함수
    function fetchWeatherData() {
        $.ajax({
            url: '/weather/current',
            type: 'GET',
            dataType: 'json',
            success: function (data) {
                // JSON 데이터 구조를 이용하여 각 항목에 대한 값을 추출
                //console.log(data); // 반환된 데이터를 콘솔에 출력
                const fullAddress = data.address;
                const shortAddress = fullAddress.split(" ")[0] + " " + fullAddress.split(" ")[1] + " " + fullAddress.split(" ")[2];
                $('#area').text(shortAddress); // 지역 정보 표시
                $('#temperature').html(`${data.T1H}<span class="celsius">℃</span>`);
                $('#precipitationProbability').html(data.POP ? `${data.POP}%` : '0%'); // 강수확률이 없는 경우 '0%'로 표시
                $('#humidity').html(`${data.REH}%`); // 습도를 표시할 때 '%'를 추가
                $('#windSpeed').html(`${data.WSD}m/s`); // 풍속을 표시할 때 'm/s'를 추가

                // 날씨 아이콘 업데이트
                updateWeatherIcon(data.SKY, data.PTY);

                const now = new Date();
                const formatted = now.getHours().toString().padStart(2, '0') + ':' +
                    now.getMinutes().toString().padStart(2, '0');
                $('#lastUpdated').text(`업데이트: ${formatted}`);
            },
            error: function (error) {
                console.error('Error fetching weather data:', error);
            }
        });
    }

    // 날씨 아이콘 업데이트 함수
    function updateWeatherIcon(skyValue, ptyValue) {
        // console.log("PTY Value:", ptyValue);
        // console.log("SKY Value:", skyValue);

        let iconPath = withCtx('/images/icon/weather/');
        let altText = '날씨 아이콘';

        // PTY 값에 따라 먼저 판단 (강수 형태 우선)
        if (ptyValue == '1') {
            iconPath += 'ico-wt4.svg'; // 비
            altText = '비';
        } else if (ptyValue == '3') {
            iconPath += 'ico-wt5.svg'; // 눈
            altText = '눈';
        } else if (ptyValue == '4') {
            iconPath += 'ico-wt7.svg'; // 소나기
            altText = '소나기';
        } else {
            // PTY 값이 0이거나 비어 있을 때는 SKY 값으로 판단
            if (skyValue == '1') {
                iconPath += 'ico-wt1.svg'; // 맑음
                altText = '맑음';
            } else if (skyValue == '2') {
                iconPath += 'ico-wt2.svg'; // 구름 조금
                altText = '구름 조금';
            } else if (skyValue == '3' || skyValue == '4') {
                iconPath += 'ico-wt3.svg'; // 구름 많음 또는 흐림
                altText = '구름 많음 또는 흐림';
            }
        }

        // 아이콘 업데이트
        const weatherIcon = $('#weatherIcon');
        weatherIcon.attr('src', iconPath);
        weatherIcon.attr('alt', altText);

    }

    document.addEventListener('DOMContentLoaded', function () {
        const wrapper = document.getElementById('spjangSelectWrapper');
        const select = document.createElement('select');

        // 1. 현재 sessionStorage에 저장된 값을 가져옴
        let currentSpjangcd = sessionStorage.getItem('spjangcd');

        // 3. 셀렉트 박스 옵션 생성
        select.id = 'spjangcd';
        select.name = 'spjangcd';
        select.classList.add('select-no-border');

        // 4. 변경 시 저장 및 새로고침
        select.addEventListener('change', function () {
            sessionStorage.setItem('spjangcd', this.value);
            window.location.reload();
        });

        wrapper.appendChild(select);
    });

</script>
