<html layout:decorate="~{layout_page}">
<head>
    <style>
        #iframe-storyboard {
            visibility: hidden;
        }
    </style>
</head>



<th:block layout:fragment="content">
    <div class="layout-contents">
        <div class="page-title-wrap" style="margin-bottom: 0px;">
            <div class="left">
                <h2>мҠӨнҶ лҰ¬ліҙл“ң</h2>
                <a title="л¶Ғл§ҲнҒ¬" class="bookmark toggle">
                    лӮҙ л©”лүҙ
                </a>
            </div>
            <ul class="page-navi">
                <li><img th:src="@{/images/icon/ico-nav-home.svg}" alt="нҷҲм•„мқҙмҪҳ"></li>
                <li>лҢҖмӢңліҙл“ң</li>
                <li>лҢҖмӢңліҙл“ң</li>
                <li>мҠӨнҶ лҰ¬ліҙл“ң</li>
            </ul>
        </div>
        <div style="height: 850px;">
            <div style="width:100%;height:100%;position:relative">
                <iframe src="" frameborder="0" id ="iframe-storyboard" name="iframe-storyboard" style="width:100%;height:100%"></iframe>
            </div>
        </div>
<!--<div style="position:absolute;width:100%;display: inline-block;z-index:999">
    <button type="button" class="btn-default pull-right" id="btnHeaderCompress" title="нҷ”л©ҙ нҷ•лҢҖ/м¶•мҶҢ"><i class="fas fa-compress" id="iCompress"></i></button>
</div>-->
    </div>
</th:block>

<th:block layout:fragment="scripts">
<script type="text/javascript">

    class StoryboardPage {
        constructor() {
            this.$frame = $('#iframe-storyboard'); // iframe м„ нғқ
            this.items = [];
            this.currentIndex = 0;
            this.items = this.getStoryboardItemList();

            // мҙҲкё°м—җ iframe мҲЁк№Җ
            this.$frame.css('visibility', 'hidden');
        }

        getStoryboardItemList() {
            let url = '/api/system/storyboard?action=read';
            let items = AjaxUtil.getSyncData(url);
            return items.data;
        }

        injectCSS() {
            let iframeDocument = this.$frame[0].contentDocument || this.$frame[0].contentWindow.document;
            if (iframeDocument) {
                let style = iframeDocument.createElement('style');
                style.innerHTML = `
                .page-title-wrap { display: none !important; }
                body { opacity: 0; transition: opacity 0.2s; }  /* л¶Җл“ңлҹҪкІҢ лӮҳнғҖлӮҳлҠ” нҡЁкіј */
            `;
                iframeDocument.head.appendChild(style);
            }
        }

        callbackTimeout(context) {
            if (context.currentIndex >= context.items.length) {
                context.currentIndex = 0;
            }
            let item = context.items[context.currentIndex];

            //  мғҲлЎңмҡҙ нҷ”л©ҙмңјлЎң л°”лҖҢкё° м „м—җ мҲЁк№Җ (к№ңл№Ўмһ„ л°©м§Җ)
            context.$frame.css('visibility', 'hidden');

            context.$frame[0].src = item.Url;
            context.currentIndex++;

            // iframeмқҙ лЎңл“ңлҗҳл©ҙ мӢӨн–ү
            context.$frame.off('load').on('load', function() {
                context.injectCSS(); // CSS мЈјмһ…

                let iframeDocument = this.contentDocument || this.contentWindow.document;
                if (iframeDocument) {
                    let body = iframeDocument.body;
                    if (body) {
                        body.style.opacity = "1"; // л¶Җл“ңлҹҪкІҢ лӮҳнғҖлӮҳлҠ” нҡЁкіј
                    }
                }

                //  мғҲлЎңмҡҙ нҷ”л©ҙмқҙ мҷ„м „нһҲ лЎңл“ңлҗң нӣ„ н‘ңмӢң
                $(this).css('visibility', 'visible');
            });

            setTimeout(context.callbackTimeout, 1000 * item.Duration, context);
        }

        start() {
            if (this.items.length == 0) {
                return;
            }
            let startItem = this.items[0];

            //  мІ« лІҲм§ё нҷ”л©ҙ лЎңл“ң м „м—җ мҲЁк№Җ (к№ңл№Ўмһ„ л°©м§Җ)
            this.$frame.css('visibility', 'hidden');
            this.$frame[0].src = startItem.Url;
            this.currentIndex++;

            // iframeмқҙ лЎңл“ңлҗҳл©ҙ мӢӨн–ү
            this.$frame.off('load').on('load', () => {
                this.injectCSS(); // CSS мЈјмһ…

                let iframeDocument = this.$frame[0].contentDocument || this.$frame[0].contentWindow.document;
                if (iframeDocument) {
                    let body = iframeDocument.body;
                    if (body) {
                        body.style.opacity = "1"; // л¶Җл“ңлҹҪкІҢ лӮҳнғҖлӮҳлҠ” нҡЁкіј
                    }
                }

                // мҷ„м „нһҲ лЎңл“ңлҗң нӣ„ iframe н‘ңмӢң
                this.$frame.css('visibility', 'visible');
            });

            setTimeout(this.callbackTimeout, 1000 * startItem.Duration, this);
        }
    }

    $(document).ready(function() {
        page = new StoryboardPage();
        page.start();
    });

</script>
</th:block>
</html>
