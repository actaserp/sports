<html layout:decorate="~{layout_page}" xmlns:layout="http://www.w3.org/1999/xhtml">

<meta name="_csrf" content="${_csrf.token}">
<meta name="_csrf_header" content="${_csrf.headerName}">

<head>
  <style>
    .wj-header {
      text-align: center;
    }

    /* 셀 왼쪽 정렬 */
    .wj-cell {
      text-align: left;
    }
  </style>
</head>

<th:block layout:fragment="content">

  <!--- (레이아웃) Contents 영역 -->
  <div class="layout-contents">
    <!-- Page Title -->
    <div class="page-title-wrap">
      <div class="left">
        <h2>결재라인현황</h2>
        <a title="북마크" class="bookmark toggle">
          내 메뉴
        </a>
      </div>
      <ul class="page-navi">
        <li><img th:src="@{/images/icon/ico-nav-home.svg}" alt="홈아이콘"></li>
        <li>결재라인관리</li>
        <li>결재라인현황</li>
      </ul>
    </div>

    <div class="tab-wrap">
      <div class="tab-contents">
        <!-- Section -->
        <section class="tab-item" id="tab1">
          <div class="section-top">
            <div class="search-wrap">
              <dl>
                <dt>
                  <label for="comcd">
                    문서코드
                  </label>
                </dt>
                <dd>
                  <select id="comcd">
                    <option></option>
                  </select>
                </dd>
              </dl>
            </div>
          </div> <!--//section-top end -->
          <div class="row">
            <div class="wp30 mg-r10">
              <div class="container-fluid col">
                <div id="theGrid" style="height: 580px;"></div>
              </div>
            </div>
            <div class="col wp68">
              <div class="section">
                <div class="container-fluid col">
                  <div id="theGrid2" style="height: 580px;"></div>
                </div>
              </div>
            </div>
          </div>
        </section>
        <!-- Section -->
      </div>
    </div>
  </div> <!--//layout-contents end -->

  <footer style="margin-top: 12px;">
    <p>Copyrightⓒ 0000 corp. All rights reserved.</p>
  </footer>
</th:block>

<th:block layout:fragment="scripts">
  <script type="text/javascript">
   class PaymentLinePage {
    constructor() {
     this.theGrid = null;
     this.theGrid2 = null;
     this.viewData = new wijmo.collections.CollectionView();
     this.viewData2 = new wijmo.collections.CollectionView();
     this.url = '/api/paymentLine';
     this.selectedPersonid = null;
     this.selectedPapercd = null;
     this.init();
    }

    init() {
     // 왼쪽 그리드 생성
     this.theGrid = new wijmo.grid.FlexGrid('#theGrid', {
      autoGenerateColumns: false,
      showMarquee: true,
      isReadOnly: true,
      selectionMode: wijmo.grid.SelectionMode.Row,
      formatItem: (s, e) => {
       if (e.panel.cellType === wijmo.grid.CellType.ColumnHeader) {
        e.cell.style.textAlign = 'center';
       }
      },
      columns: [
       { binding: 'personid', header: '사원코드', width: '*', minWidth: 105, align: 'center' },
       { binding: 'pernm',    header: '사원명',   width: '*', minWidth: 105, align: 'center' },
       { binding: 'papernm',  header: '문서명',   width: '*', minWidth: 105, align: 'center' }
      ],
      itemsSource: this.viewData,
     });

     this.theGrid.rowHeaders.columns.splice(0, 1);
     new FlexGridContextMenu(this.theGrid);
     this.theGrid.downloadFileName = '문서코드';

     // 더블클릭 이벤트
     this.theGrid.hostElement.addEventListener('dblclick', (e) => {
      let items = this.theGrid.selectedItems;
      if (items.length === 0) return false;

      let item = items[0];
      if (!item || !item.personid) return false;
      console.log("personid 확인 : ", item.personid);   // "029" 로 찍히는지 확인
      console.log("papercd 확인 : ", item.papercd);
      this.selectedPersonid = item.personid;
      this.selectedPapercd = item.papercd;  // 문서코드도 같이 저장
      this.fetchListData2(this.selectedPersonid, this.selectedPapercd);
     });

     // 오른쪽 그리드 생성
     this.theGrid2 = new wijmo.grid.FlexGrid('#theGrid2', {
      autoGenerateColumns: false,
      showMarquee: true,
      isReadOnly: true,
      selectionMode: wijmo.grid.SelectionMode.Row,
      formatItem: (s, e) => {
       if (e.panel.cellType === wijmo.grid.CellType.ColumnHeader) {
        e.cell.style.textAlign = 'center';
       }
      },
      columns: [
       { binding: 'no',         header: 'No',      width: 80,  align: 'center' },
       { binding: 'kcpersonid', header: '결재자코드', width: '*', minWidth: 105, align: 'center' },
       { binding: 'kcpernm',    header: '결재자명',  width: '*', minWidth: 105, align: 'center' },
       { binding: 'gubunnm',    header: '구분',     width: '*', minWidth: 105, align: 'center' },
       { binding: 'seq',        header: '결재순서',  width: '*', minWidth: 105, align: 'center' },
       { binding: 'remark',     header: '비고',     width: '*', minWidth: 105, align: 'center' }
      ],
      itemsSource: this.viewData2,
     });

     this.theGrid2.rowHeaders.columns.splice(0, 1);
     new FlexGridContextMenu(this.theGrid2);
     this.theGrid2.downloadFileName = '사원문서';

    } // init

    // 왼쪽 그리드 데이터 조회
    fetchListData() {
     const url = this.url + '/read';
     const data = { comcd: $('#comcd').val() };

     AjaxUtil.getAsyncData(url, data, (result) => {
      if (result != null) {
       let rows = result.data || [];
       while (rows.length < 14) rows.push({});
       this.viewData = new wijmo.collections.CollectionView(rows);
       this.theGrid.itemsSource = this.viewData;
      }
     });
    }

    // 오른쪽 그리드 데이터 조회
    fetchListData2(perid, papercd) {
     const url = this.url + '/readLine';
     const data = {
      comcd: papercd,   // 그리드의 문서코드 사용
      personid: perid
     };

     AjaxUtil.getAsyncData(url, data, (result) => {
      if (result != null) {
       let rows = result.data || [];
       while (rows.length < 14) rows.push({});
       this.viewData2 = new wijmo.collections.CollectionView(rows);
       this.theGrid2.itemsSource = this.viewData2;
      }
     });
    }

    // 문서코드 변경 시
    changeComcdSelect() {
     this.selectedPersonid = null;
     this.fetchListData();
     this.viewData2 = new wijmo.collections.CollectionView([]);
     this.theGrid2.itemsSource = this.viewData2;
    }

   } // class PaymentLinePage

   let page = null;

   $(document).ready(function () {
    page = new PaymentLinePage();

    AjaxUtil.fillSelectOptions($('#comcd'), 'appr_doc', 'all', false, 'appr_doc');

    page.fetchListData();

    $('#comcd').on('change', function () {
     page.changeComcdSelect();
    });
   });
  </script>

</th:block>
</html>
