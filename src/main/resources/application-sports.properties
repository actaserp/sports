ncp_api_accessKey=${ncp_api_accessKey}
ncp_api_secretKey=${ncp_api_secretKey}
ncp_api_cwKey=${ncp_api_cwKey}
ncp_api_instanceNo=${ncp_api_instanceNo}

# NCP Object Storage (S3 호환)
ncp.storage.endpoint=https://kr.object.ncloudstorage.com
ncp.storage.region=kr-standard
ncp.storage.bucket=actas-ai-files

# Extra DataSource (외부 MSSQL – 특정 페이지 전용)
extra.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
extra.datasource.jdbc-url=${ERP_DB_URL}
extra.datasource.username=${ERP_DB_USERNAME}
extra.datasource.password=${ERP_DB_PASSWORD}
extra.datasource.hikari.maximum-pool-size=2
extra.datasource.hikari.minimum-idle=0
extra.datasource.hikari.idle-timeout=30000
extra.datasource.hikari.connection-timeout=10000
